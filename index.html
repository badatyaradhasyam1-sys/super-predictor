<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AI Predictor Pro - Data Shift Fix</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

    :root {
      --neon: #00f3ff;
      --bg: #010409;
      --glass: rgba(255, 255, 255, 0.05);
      --purple: #8a2be2;
      --red: #ff3e3e;
      --green: #00ff88;
      --gold: #ffcc00;
    }

    body {
      margin: 0; background: var(--bg); color: #e6edf3;
      font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center;
    }

    .container {
      width: 100%; max-width: 420px; min-height: 100vh;
      padding: 20px 15px; box-sizing: border-box;
      background: radial-gradient(circle at 50% 0%, #161b22 0%, #010409 100%);
    }

    .header {
      text-align: center; font-family: 'Orbitron', sans-serif;
      font-size: 22px; font-weight: 700; letter-spacing: 4px;
      color: var(--neon); text-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
      margin-bottom: 25px;
    }

    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--glass); padding: 15px; border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1); margin-bottom: 25px;
    }

    #timer { font-family: 'Orbitron', sans-serif; font-size: 26px; color: var(--gold); }

    .main-display {
      background: rgba(13, 17, 23, 0.9); border-radius: 24px;
      padding: 45px 20px; text-align: center;
      border: 1px solid var(--neon);
      box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
      margin-bottom: 25px;
    }

    #prediction-text { 
      font-family: 'Orbitron', sans-serif; font-size: 52px; font-weight: 700; 
      color: #30363d; letter-spacing: 3px; transition: 0.4s;
    }

    .result-glow { animation: zoomIn 0.5s forwards; }
    @keyframes zoomIn {
      0% { transform: scale(0.7); opacity: 0; }
      100% { transform: scale(1); opacity: 1; text-shadow: 0 0 30px currentColor; }
    }

    .history-section { display: flex; flex-direction: column; gap: 10px; }
    .history-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--glass); padding: 8px 12px; border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .circle-no {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, var(--neon), var(--purple));
      color: #000; display: flex; justify-content: center; align-items: center;
      font-weight: 700; font-size: 13px; cursor: pointer; flex-shrink: 0;
    }

    .num-pad { display: flex; gap: 5px; overflow-x: auto; scrollbar-width: none; }
    .num-btn {
      width: 26px; height: 26px; border-radius: 50%;
      border: 1px solid #30363d; color: #8b949e; 
      font-size: 11px; display: flex; justify-content: center; align-items: center; flex-shrink: 0;
    }
    .num-btn.active { 
      background: var(--neon); color: #000; border-color: var(--neon);
      box-shadow: 0 0 10px var(--neon);
    }

    .btn-action {
      width: 100%; padding: 18px; margin-top: 20px;
      background: linear-gradient(135deg, var(--neon), var(--purple));
      border: none; border-radius: 15px; color: white;
      font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 16px;
      cursor: pointer; text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">SUPER PREDICTOR</div>

  <div class="status-bar">
    <div>
      <div style="font-size: 9px; color: #8b949e; letter-spacing: 1px;">PERIOD SYNC</div>
      <div id="current-period" style="font-size: 15px; font-weight: 700; color: #fff;">---</div>
    </div>
    <div id="timer">00:00</div>
  </div>

  <div class="main-display">
    <div style="font-size: 11px; color: #8b949e; margin-bottom: 5px; letter-spacing: 2px;">AI PROBABILITY</div>
    <div id="prediction-text">READY</div>
  </div>

  <div id="history-list" class="history-section"></div>

  <button class="btn-action" onclick="processAI()">Generate Signal</button>
</div>

<script>
  let historyData = new Array(20).fill(null);
  let listMode = 0; // 0: Close, 1: 10, 2: 20
  let lastPeriod = "";

  function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

  function syncEngine() {
    const now = new Date();
    const utcMin = now.getUTCHours() * 60 + now.getUTCMinutes();
    const utcSec = now.getUTCSeconds();
    
    // Period Calculation
    const dateStr = now.getUTCFullYear().toString() + 
                    (now.getUTCMonth() + 1).toString().padStart(2, '0') + 
                    now.getUTCDate().toString().padStart(2, '0');
    const currentP = dateStr + "1000" + (10001 + utcMin);

    // FIX: Data Shifting Logic
    if (currentP !== lastPeriod) {
      if (lastPeriod !== "") {
        // Shift data: 1 goes to 2, 2 goes to 3...
        for (let i = 19; i > 0; i--) {
          historyData[i] = historyData[i - 1];
        }
        historyData[0] = null; // Clear Row 1 for new input
        renderRows();
        vibrate(150);
      }
      lastPeriod = currentP;
      document.getElementById('current-period').innerText = currentP;
    }

    // Timer Update
    const remaining = 59 - utcSec;
    document.getElementById('timer').innerText = "00:" + remaining.toString().padStart(2, '0');
  }

  function renderRows() {
    const list = document.getElementById('history-list');
    list.innerHTML = "";
    
    let limit = (listMode === 0) ? 1 : (listMode === 1 ? 10 : 20);

    for (let i = 0; i < limit; i++) {
      const row = document.createElement('div');
      row.className = `history-row`;
      
      let btns = '';
      for (let n = 0; n <= 9; n++) {
        btns += `<div class="num-btn ${historyData[i] === n ? 'active' : ''}" onclick="setInput(${i}, ${n})">${n}</div>`;
      }
      
      let navAction = "";
      if (i === 0) navAction = `onclick="handleNav(1)"`;
      if (i === 9) navAction = `onclick="handleNav(10)"`;

      row.innerHTML = `<div class="circle-no" ${navAction}>${i + 1}</div><div class="num-pad">${btns}</div>`;
      list.appendChild(row);
    }
  }

  function handleNav(val) {
    vibrate(40);
    if (val === 1) listMode = (listMode === 0) ? 1 : 0;
    else if (val === 10) listMode = (listMode === 1) ? 2 : 1;
    renderRows();
  }

  function setInput(idx, val) {
    vibrate(30);
    historyData[idx] = val;
    renderRows();
  }

  function processAI() {
    const filled = historyData.filter(v => v !== null);
    if (filled.length < 5) { alert("कम से कम 5 पिछले नंबर भरें!"); return; }

    vibrate([60, 40, 60]);
    const predEl = document.getElementById('prediction-text');
    predEl.classList.remove('result-glow');
    void predEl.offsetWidth;
    predEl.classList.add('result-glow');

    // High Precision Logic (Loss Fix)
    const last3 = filled.slice(0, 3);
    const avg = filled.reduce((a, b) => a + b, 0) / filled.length;
    
    let decision = "";
    let color = "";

    // Trend Detection
    const isDragon = (last3[0] > 4 && last3[1] > 4 && last3[2] > 4) || (last3[0] < 5 && last3[1] < 5 && last3[2] < 5);

    if (isDragon) {
        decision = (last3[0] > 4) ? "SMALL" : "BIG"; // Trend reversal detection
    } else {
        decision = (avg > 4.5) ? "BIG" : "SMALL";
    }

    color = (decision === "BIG") ? "var(--neon)" : "var(--gold)";

    // Force Color logic for high volatility
    if (avg > 3.5 && avg < 5.5 && !isDragon) {
        decision = ([0,2,4,6,8].includes(last3[0])) ? "RED" : "GREEN";
        color = (decision === "RED") ? "var(--red)" : "var(--green)";
    }

    predEl.innerText = decision;
    predEl.style.color = color;
    
    listMode = 0; // ऑटो क्लोज
    renderRows();
  }

  setInterval(syncEngine, 1000);
  syncEngine();
  renderRows();
</script>
</body>
</html>
