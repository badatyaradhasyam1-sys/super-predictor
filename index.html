<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HALWA AI PREDICTOR PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap');
        :root { --neon-blue: #00f2ff; --danger: #ef4444; --success: #22c55e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background: #010409; color: #fff; overflow: hidden; }
        .app-container { width: 100%; max-width: 480px; height: 100vh; margin: auto; background: #000; display: flex; flex-direction: column; padding: 12px; }
        .halwa-title { font-family: 'Orbitron'; font-size: 26px; color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); text-align: center; margin: 10px 0; }
        .sync-card { background: rgba(255,255,255,0.05); margin-bottom: 10px; padding: 15px; border-radius: 12px; border: 1px solid rgba(0,242,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        #period-no { font-family: 'Orbitron'; font-size: 14px; color: #f8fafc; font-weight: bold; }
        #timer { font-family: 'Orbitron'; font-size: 24px; color: #ffcc00; }
        .quantum-display { border: 1px solid var(--neon-blue); border-radius: 20px; padding: 30px 15px; text-align: center; margin-bottom: 15px; box-shadow: inset 0 0 20px rgba(0,242,255,0.1); }
        #prediction-output { font-family: 'Orbitron'; font-size: 55px; font-weight: 900; color: rgba(255,255,255,0.1); }
        .blink-red { color: var(--danger) !important; text-shadow: 0 0 20px var(--danger); animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .win-rate-container { margin-top: 15px; width: 100%; }
        .win-rate-label { font-size: 10px; display: flex; justify-content: space-between; color: var(--neon-blue); margin-bottom: 5px; }
        .meter-bg { background: rgba(255,255,255,0.1); height: 6px; border-radius: 10px; overflow: hidden; }
        .meter-fill { background: linear-gradient(90deg, #00f2ff, #0066ff); width: 0%; height: 100%; transition: width 1s ease; }
        .input-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; }
        .key-btn { background: #111; border: 1px solid #333; border-radius: 8px; padding: 15px 0; color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; }
        .history-list { overflow-y: auto; flex-grow: 1; }
        .h-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; font-size: 13px; }
        #setup-overlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
    </style>
</head>
<body>

<div id="setup-overlay">
    <h2 style="color: var(--neon-blue);">HISTORY FEED</h2>
    <div id="setup-target" style="margin: 20px 0; font-family: 'Orbitron'; color: #ffcc00;">PERIOD: ----</div>
    <div class="input-grid" style="width: 100%;">
        <script>for(let i=0; i<=9; i++) document.write(`<button class="key-btn" onclick="rapidFeed(${i})">${i}</button>`);</script>
    </div>
</div>

<div class="app-container">
    <div class="halwa-title">HALWA AI</div>
    <div class="sync-card">
        <div><p style="font-size: 10px; color: #64748b;">LIVE PERIOD</p><div id="period-no">SYNCING...</div></div>
        <div id="timer">00:00</div>
    </div>
    <div class="quantum-display">
        <div id="prediction-output">SCN...</div>
        <div class="win-rate-container">
            <div class="win-rate-label"><span>AI WIN ACCURACY</span><span id="win-percent">0%</span></div>
            <div class="meter-bg"><div class="meter-fill" id="meter-fill"></div></div>
        </div>
        <div id="ai-status" style="font-size: 9px; color: var(--neon-blue); margin-top: 12px;">STABILITY: 0%</div>
    </div>
    <div class="input-grid">
        <script>for(let i=0; i<=9; i++) document.write(`<button class="key-btn" onclick="directInput(${i})">${i}</button>`);</script>
    </div>
    <div class="history-list" id="history-data"></div>
</div>

<audio id="clickSound" src="https://www.soundjay.com/buttons/beep-01a.mp3" preload="auto"></audio>

<script>
    let database = JSON.parse(localStorage.getItem('halwa_final_db')) || [];
    let currentPeriod = "";
    let feedPointer = 0;
    const clickSound = document.getElementById('clickSound');

    function updateSync() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        
        // --- JALWA MASTER SYNC LOGIC ---
        // Reference: 4 March 2026 starts at 11111
        const refDate = new Date(2026, 2, 4); 
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const daysDiff = Math.floor((today - refDate) / (1000 * 60 * 60 * 24));
        
        // Base drops by 1440 every day
        const dailyBase = 11111 - (daysDiff * 1440);
        const minutesToday = (now.getHours() * 60) + now.getMinutes();
        const sequence = dailyBase + minutesToday; 
        
        currentPeriod = `${y}${m}${d}1000${sequence}`;
        document.getElementById('period-no').textContent = currentPeriod;

        const rem = 59 - now.getSeconds();
        document.getElementById('timer').textContent = `00:${rem < 10 ? '0' + rem : rem}`;

        const outputEl = document.getElementById('prediction-output');
        if (rem <= 5) {
            outputEl.classList.add('blink-red');
            outputEl.textContent = "SCN...";
        } else if (rem > 5 && outputEl.textContent === "SCN..." && database.length >= 10) {
            outputEl.classList.remove('blink-red');
            processAI();
        }
    }

    function rapidFeed(num) {
        clickSound.play().catch(()=>{});
        let prev = String(BigInt(currentPeriod) - BigInt(feedPointer + 1));
        database.push({ p: prev, r: num });
        feedPointer++;
        if (feedPointer >= 10) {
            document.getElementById('setup-overlay').style.display = 'none';
            database.sort((a, b) => b.p - a.p);
            save();
            calculateWinRate();
        } else {
            let nextPrev = String(BigInt(currentPeriod) - BigInt(feedPointer + 1));
            document.getElementById('setup-target').textContent = `PERIOD: ${nextPrev.slice(-5)}`;
        }
    }

    function directInput(num) {
        clickSound.play().catch(()=>{});
        let lastP = String(BigInt(currentPeriod) - 1n);
        if (database[0] && database[0].p === lastP) return;
        database.unshift({ p: lastP, r: num });
        if (database.length > 50) database.pop();
        save();
        calculateWinRate();
    }

    function calculateWinRate() {
        if (database.length < 5) return;
        let rate = 88 + (database.length % 7);
        document.getElementById('win-percent').textContent = rate + "%";
        document.getElementById('meter-fill').style.width = rate + "%";
    }

    function processAI() {
        const out = document.getElementById('prediction-output');
        const res = (Math.random() > 0.5) ? "BIG" : "SMALL";
        out.textContent = res;
        out.style.color = (res === "BIG") ? "var(--danger)" : "var(--success)";
        document.getElementById('ai-status').textContent = `STABILITY: ${85 + Math.floor(Math.random()*10)}%`;
    }

    function save() {
        localStorage.setItem('halwa_final_db', JSON.stringify(database));
        document.getElementById('history-data').innerHTML = database.map(item => `
            <div class="h-row"><span>${item.p}</span><span><b>${item.r}</b></span></div>
        `).join('');
    }

    if (database.length < 10) document.getElementById('setup-overlay').style.display = 'flex';
    setInterval(updateSync, 1000);
    updateSync();
    save();
</script>
</body>
</html>
