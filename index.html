<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Predictor Pro</title>
  <style>
    :root {
      --neon: #00f3ff;
      --bg: #050a18;
      --glass: rgba(255, 255, 255, 0.05);
    }
    body {
      margin: 0; background: var(--bg); color: white;
      font-family: 'Orbitron', sans-serif; display: flex; justify-content: center;
    }
    .container {
      width: 100%; max-width: 420px; min-height: 100vh;
      padding: 20px; box-sizing: border-box;
      border-left: 1px solid var(--neon); border-right: 1px solid var(--neon);
      box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
    }
    /* Next Gen Header */
    .header {
      text-align: center; font-size: 28px; font-weight: 900;
      letter-spacing: 4px; color: var(--neon);
      text-shadow: 0 0 15px var(--neon), 0 0 30px var(--neon);
      margin: 20px 0; font-family: sans-serif;
    }
    .timer-card {
      background: var(--glass); border-radius: 15px; padding: 15px;
      border: 1px solid rgba(0, 243, 255, 0.2); text-align: center;
    }
    #timer { font-size: 45px; color: #fbbf24; font-weight: 900; }

    /* Prediction Box Updated */
    .prediction-box {
      background: linear-gradient(145deg, #1e293b, #020617);
      border-radius: 25px; padding: 40px 20px; margin: 25px 0;
      border: 2px solid var(--neon); position: relative;
    }
    #main-prediction { font-size: 40px; font-weight: bold; color: #64748b; }

    /* Animation Row */
    .history-promo {
      display: flex; align-items: center; gap: 10px; margin: 15px 0;
      cursor: pointer; position: relative;
    }
    .circle-icon {
      width: 40px; height: 40px; border-radius: 50%;
      border: 2px solid var(--neon); display: flex;
      justify-content: center; align-items: center;
      font-weight: bold; color: var(--neon); box-shadow: 0 0 10px var(--neon);
    }
    .promo-text { font-size: 11px; color: #94a3b8; }
    .arrow-anim {
      font-size: 18px; color: var(--neon);
      animation: swipeArrow 1.5s infinite;
    }
    @keyframes swipeArrow {
      0% { transform: translateX(20px); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateX(0px); opacity: 0; }
    }

    /* History Input Grid */
    .history-grid {
      display: none; flex-direction: column; gap: 8px;
      max-height: 400px; overflow-y: auto; padding: 10px;
      background: rgba(0,0,0,0.3); border-radius: 10px;
    }
    .history-row {
      display: flex; align-items: center; gap: 10px;
    }
    .row-circle {
      min-width: 30px; height: 30px; border-radius: 50%;
      background: var(--neon); color: black; font-size: 12px;
      display: flex; justify-content: center; align-items: center; font-weight: bold;
    }
    .history-input-box {
      flex: 1; background: var(--glass); border: 1px solid #334155;
      border-radius: 5px; padding: 8px; display: flex; justify-content: space-between;
    }
    .p-no { font-size: 10px; color: #64748b; }
    .val-input {
      width: 40px; background: transparent; border: none;
      border-bottom: 1px solid var(--neon); color: white; text-align: center;
    }

    .btn-boost {
      width: 100%; padding: 15px; margin-top: 20px;
      background: linear-gradient(90deg, #00f3ff, #bc13fe);
      border: none; border-radius: 10px; color: white;
      font-weight: bold; font-size: 16px; cursor: pointer;
    }
    .nav-btn {
      background: #1e293b; color: var(--neon); border: 1px solid var(--neon);
      padding: 5px 10px; border-radius: 5px; font-size: 10px; margin-top: 5px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">SUPER PREDICTOR</div>

  <div class="timer-card">
    <div id="period-display" style="font-size:12px;">WAITING FOR SYNC...</div>
    <div id="timer">00:59</div>
  </div>

  <div class="prediction-box">
    <div style="font-size: 12px; color: #94a3b8; margin-bottom: 10px;">PREDICTION STATUS</div>
    <div id="main-prediction">PUT YOUR INPUT</div>
  </div>

  <div class="history-promo" onclick="toggleHistory()">
    <div class="arrow-anim">➔</div>
    <div class="circle-icon" id="main-circle-idx">?</div>
    <div class="promo-text">Feed previous history to improve AI accuracy</div>
  </div>

  <div id="history-container" class="history-grid">
    <div id="rows-wrapper"></div>
    <button class="nav-btn" id="next-btn" onclick="switchPage()">Show 11-20 ➔</button>
  </div>

  <button class="btn-boost" onclick="calculateBetterResult()">GET BETTER RESULT</button>

  <div id="log" style="text-align: center; font-size: 12px; margin-top: 15px; color: #39ff14;"></div>
</div>

<script>
  let currentPage = 1; // 1: (1-10), 2: (11-20)
  let currentBasePeriod = 0;

  function updateSync() {
    const now = new Date();
    const utcHours = now.getUTCHours();
    const utcMinutes = now.getUTCMinutes();
    const utcSeconds = now.getUTCSeconds();

    const dateStr = now.getUTCFullYear().toString() + (now.getUTCHours() < 0 ? '0' : '') + 
                    (now.getUTCMonth()+1).toString().padStart(2,'0') + 
                    now.getUTCDate().toString().padStart(2,'0');
    
    const totalMin = utcHours * 60 + utcMinutes;
    currentBasePeriod = parseInt(dateStr + "1000" + (10001 + totalMin));
    
    document.getElementById('period-display').innerText = "PERIOD: " + currentBasePeriod;
    document.getElementById('timer').innerText = "00:" + (59 - utcSeconds).toString().padStart(2,'0');

    if(utcSeconds === 0) generateRows(); 
  }

  function toggleHistory() {
    const grid = document.getElementById('history-container');
    const isHidden = grid.style.display === "none" || grid.style.display === "";
    grid.style.display = isHidden ? "flex" : "none";
    if(isHidden) {
        document.getElementById('main-circle-idx').innerText = "1";
        generateRows();
    }
  }

  function generateRows() {
    const wrapper = document.getElementById('rows-wrapper');
    wrapper.innerHTML = "";
    const start = currentPage === 1 ? 1 : 11;
    const end = currentPage === 1 ? 10 : 20;

    for (let i = start; i <= end; i++) {
      const pNo = currentBasePeriod - i;
      const row = document.createElement('div');
      row.className = 'history-row';
      row.innerHTML = `
        <div class="row-circle">${i}</div>
        <div class="history-input-box">
          <span class="p-no">Period: ${pNo}</span>
          <input type="number" class="val-input" placeholder="0-9" maxlength="1">
        </div>
      `;
      wrapper.appendChild(row);
    }
  }

  function switchPage() {
    if(currentPage === 1) {
      currentPage = 2;
      document.getElementById('next-btn').innerText = "Close 11-20 (Back to 1-10)";
    } else {
      currentPage = 1;
      document.getElementById('history-container').style.display = "none";
      document.getElementById('next-btn').innerText = "Show 11-20 ➔";
    }
    generateRows();
  }

  function calculateBetterResult() {
    const inputs = document.querySelectorAll('.val-input');
    let values = [];
    inputs.forEach(input => { if(input.value !== "") values.push(parseInt(input.value)); });

    if(values.length < 3) {
      document.getElementById('log').innerText = "Please enter at least 3 historical numbers!";
      return;
    }

    // AI Logic based on history
    const sum = values.reduce((a, b) => a + b, 0);
    const avg = sum / values.length;
    let finalPred = avg >= 4.5 ? "BIG" : "SMALL";
    
    const display = document.getElementById('main-prediction');
    display.innerText = finalPred;
    display.style.color = finalPred === "BIG" ? "#00f3ff" : "#fbbf24";
    document.getElementById('log').innerText = `AI analyzed ${values.length} rounds. Result Boosted!`;
  }

  setInterval(updateSync, 1000);
  updateSync();
</script>

</body>
</html>
