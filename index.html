<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Super Predictor Pro AI - V5 (Fixed)</title>
  <style>
    :root {
      --neon: #00f3ff;
      --bg: #020617;
      --glass: rgba(255, 255, 255, 0.05);
      --purple: #bc13fe;
      --red: #ff4d4d;
      --green: #2ecc71;
    }
    body {
      margin: 0; background: var(--bg); color: white;
      font-family: 'Segoe UI', Roboto, sans-serif; display: flex; justify-content: center;
    }
    .container {
      width: 100%; max-width: 420px; min-height: 100vh;
      padding: 15px; box-sizing: border-box;
      background: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
    }
    .header {
      text-align: center; font-size: 26px; font-weight: 900;
      letter-spacing: 3px; color: var(--neon);
      text-shadow: 0 0 15px var(--neon); margin: 15px 0;
    }
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--glass); padding: 12px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;
    }
    #timer { font-size: 32px; color: #fbbf24; font-weight: bold; font-family: monospace; }

    .main-display {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      border-radius: 20px; padding: 40px 20px; text-align: center;
      border: 2px solid var(--neon); box-shadow: 0 0 25px rgba(0, 243, 255, 0.2);
      margin-bottom: 20px;
    }
    
    #prediction-text { 
      font-size: 48px; font-weight: 900; color: #64748b; 
      letter-spacing: 3px; transition: all 0.4s ease;
    }

    .result-glow { animation: zoomInGlow 0.6s forwards; }
    @keyframes zoomInGlow {
      0% { transform: scale(0.3); opacity: 0; }
      100% { transform: scale(1); opacity: 1; text-shadow: 0 0 30px currentColor; }
    }

    .history-section { display: flex; flex-direction: column; gap: 8px; }
    .history-row {
      display: flex; align-items: center; gap: 8px;
      background: var(--glass); padding: 6px 10px; border-radius: 50px;
      border: 1px solid rgba(0, 243, 255, 0.1);
    }
    .circle-no {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--neon); color: #000; display: flex;
      justify-content: center; align-items: center; font-weight: bold; font-size: 13px;
      flex-shrink: 0; cursor: pointer;
    }
    .num-pad { display: flex; gap: 3px; overflow-x: auto; scrollbar-width: none; }
    .num-btn {
      width: 26px; height: 26px; border-radius: 50%;
      border: 1px solid var(--neon); color: var(--neon); 
      font-size: 11px; display: flex; justify-content: center; align-items: center;
      flex-shrink: 0;
    }
    .num-btn.active { background: var(--neon); color: #000; box-shadow: 0 0 8px var(--neon); }

    .btn-action {
      width: 100%; padding: 18px; margin-top: 20px;
      background: linear-gradient(90deg, var(--neon), var(--purple));
      border: none; border-radius: 15px; color: white;
      font-weight: bold; font-size: 18px; cursor: pointer;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">SUPER PREDICTOR</div>

  <div class="status-bar">
    <div>
      <div style="font-size: 9px; color: #94a3b8; letter-spacing: 1px;">PERIOD NO</div>
      <div id="current-period" style="font-size: 16px; font-weight: bold;">---</div>
    </div>
    <div id="timer">00:00</div>
  </div>

  <div class="main-display">
    <div style="font-size: 10px; color: #94a3b8; margin-bottom: 5px;">AI STRENGTH: <span id="strength">---</span></div>
    <div id="prediction-text">WAITING DATA</div>
  </div>

  <div id="history-list" class="history-section"></div>

  <button class="btn-action" onclick="processAI()">Get
