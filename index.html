<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HALWA AI PRO - FINAL VERSION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap');
        :root { --neon: #00f2ff; --bg: #000; --card: #111; --danger: #ff4444; --success: #00ff88; --gold: #ffcc00; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; overflow: hidden; }
        
        .app-container { width: 100%; max-width: 480px; height: 100vh; margin: auto; display: flex; flex-direction: column; padding: 10px; }
        .halwa-title { font-family: 'Orbitron'; font-size: 24px; color: var(--neon); text-align: center; text-shadow: 0 0 10px var(--neon); margin: 5px 0; }
        
        /* Sync Card */
        .sync-card { background: var(--card); padding: 10px; border-radius: 12px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        #period-no { font-family: 'Orbitron'; font-size: 13px; color: #fff; }
        #timer { font-family: 'Orbitron'; font-size: 20px; color: var(--gold); }

        /* Prediction Area */
        .prediction-box { border: 1px solid rgba(0,242,255,0.2); background: rgba(255,255,255,0.01); border-radius: 12px; padding: 15px; text-align: center; margin-bottom: 8px; }
        #prediction-text { font-family: 'Orbitron'; font-size: 40px; font-weight: 900; opacity: 0.1; }
        .win-meter { margin-top: 8px; height: 3px; background: #222; border-radius: 5px; overflow: hidden; }
        #meter-fill { width: 0%; height: 100%; background: var(--neon); transition: 1s; }

        /* Analysis Status & Reset Button */
        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        #ai-status { font-size: 9px; color: var(--neon); }
        .reset-btn { font-size: 9px; color: var(--danger); cursor: pointer; border: 1px solid var(--danger); padding: 1px 6px; border-radius: 4px; text-transform: uppercase; font-weight: bold; }

        /* Keypad Layout with Small Target in Gap */
        .keypad-container { margin-bottom: 8px; }
        .grid-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        
        .gap-target { 
            text-align: center; 
            font-family: 'Orbitron'; 
            color: #666; 
            font-size: 10px; 
            height: 20px; 
            line-height: 20px;
            letter-spacing: 1px;
        }
        #target-period-show { color: var(--gold); font-weight: bold; }

        .num-btn { background: #151515; border: 1px solid #252525; padding: 12px; color: #fff; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }
        .num-btn:active { background: var(--neon); color: #000; border-color: var(--neon); }

        /* History */
        .history-list { flex-grow: 1; overflow-y: auto; background: #050505; border-radius: 10px; padding: 5px; border: 1px solid #111; }
        .h-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #111; align-items: center; cursor: pointer; }
        .badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }

        /* Modal */
        #edit-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: none; justify-content: center; align-items: center; }
        .blink { animation: blinker 0.8s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.2; } }
    </style>
</head>
<body>

<audio id="beep" src="https://www.soundjay.com/buttons/beep-01a.mp3" preload="auto"></audio>

<div id="edit-modal">
    <div style="width: 85%; background: #111; padding: 20px; border-radius: 15px; border: 1px solid var(--neon);">
        <p style="text-align:center; margin-bottom:15px; color:var(--neon); font-family:'Orbitron'; font-size: 12px;">EDIT RESULT</p>
        <div class="grid-row" style="grid-template-columns: repeat(5, 1fr);">
            <script>for(let i=0; i<=9; i++) document.write(`<button class="num-btn" onclick="applyEdit(${i})">${i}</button>`);</script>
        </div>
        <button onclick="closeEdit()" style="width:100%; margin-top:15px; color:#555; border:none; background:none; font-size:12px;">CANCEL</button>
    </div>
</div>

<div class="app-container">
    <div class="halwa-title">HALWA AI PRO</div>
    
    <div class="sync-card">
        <div><p style="font-size:9px; color:#555;">LIVE PERIOD</p><div id="period-no">SYNCING...</div></div>
        <div id="timer">00:00</div>
    </div>

    <div class="prediction-box">
        <div id="prediction-text">SCN...</div>
        <div class="win-meter"><div id="meter-fill"></div></div>
        <div class="status-bar">
            <div id="ai-status">ANALYSIS: 0%</div>
            <div class="reset-btn" onclick="resetHistory()">Reset</div>
        </div>
    </div>

    <div class="keypad-container">
        <div class="grid-row">
            <script>for(let i=0; i<=4; i++) document.write(`<button class="num-btn" onclick="handleInput(${i})">${i}</button>`);</script>
        </div>
        
        <div class="gap-target">
            NEXT INPUT: <span id="target-period-show">-----</span>
        </div>

        <div class="grid-row">
            <script>for(let i=5; i<=9; i++) document.write(`<button class="num-btn" onclick="handleInput(${i})">${i}</button>`);</script>
        </div>
    </div>

    <div class="history-list" id="main-history"></div>
</div>

<script>
    let database = JSON.parse(localStorage.getItem('halwa_v4_db')) || [];
    let currentPeriod = "";
    let targetPeriod = "";
    let editingIndex = -1;
    const sound = document.getElementById('beep');

    function playSound() { sound.currentTime = 0; sound.play().catch(()=>{}); }

    // --- RESET HISTORY FUNCTION ---
    function resetHistory() {
        if (confirm("क्या आप पूरी हिस्ट्री डिलीट करना चाहते हैं?")) {
            playSound();
            database = [];
            localStorage.removeItem('halwa_v4_db');
            // टार्गेट पीरियड को वापस सबसे लेटेस्ट पर सेट करें
            targetPeriod = String(BigInt(currentPeriod) - 1n);
            updateUI();
            calculateAIProgress();
            document.getElementById('prediction-text').textContent = "SCN...";
            document.getElementById('prediction-text').style.opacity = "0.1";
        }
    }

    function updateSync() {
        const now = new Date();
        const refDate = new Date(2026, 2, 4); 
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const daysDiff = Math.floor((today - refDate) / (1000 * 60 * 60 * 24));
        const dailyBase = 11111 - (daysDiff * 1440);
        const minutesToday = (now.getHours() * 60) + now.getMinutes();
        const sequence = dailyBase + minutesToday; 
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        
        let newLivePeriod = `${y}${m}${d}1000${sequence}`;
        
        if (newLivePeriod !== currentPeriod) {
            currentPeriod = newLivePeriod;
            let lastFinished = String(BigInt(currentPeriod) - 1n);
            if (!database.some(x => x.p === lastFinished)) {
                targetPeriod = lastFinished;
            }
        }

        document.getElementById('period-no').textContent = currentPeriod;
        
        if (!targetPeriod) targetPeriod = String(BigInt(currentPeriod) - 1n);
        document.getElementById('target-period-show').textContent = targetPeriod;

        const rem = 59 - now.getSeconds();
        const timerEl = document.getElementById('timer');
        timerEl.textContent = `00:${rem < 10 ? '0' + rem : rem}`;
        
        if (rem <= 5) {
            document.getElementById('prediction-text').textContent = "SCN...";
            document.getElementById('prediction-text').style.opacity = "0.1";
            timerEl.classList.add('blink');
        } else {
            timerEl.classList.remove('blink');
            if (document.getElementById('prediction-text').textContent === "SCN..." && database.length >= 5) {
                generatePrediction();
            }
        }
    }

    function handleInput(num) {
        playSound();
        if (database.some(item => item.p === targetPeriod)) {
            targetPeriod = String(BigInt(targetPeriod) - 1n);
            updateUI();
            return;
        }
        database.unshift({ p: targetPeriod, r: num });
        database.sort((a, b) => (BigInt(b.p) > BigInt(a.p) ? 1 : -1));
        if (database.length > 500) database.pop();
        targetPeriod = String(BigInt(targetPeriod) - 1n);
        updateUI();
        calculateAIProgress();
    }

    function generatePrediction() {
        if (database.length < 5) return;
        const last5 = database.slice(0, 5).map(x => x.r);
        let bigs = last5.filter(x => x >= 5).length;
        let prediction = (bigs >= 3) ? "SMALL" : "BIG";
        const el = document.getElementById('prediction-text');
        el.textContent = prediction;
        el.style.opacity = "1";
        el.style.color = prediction === "BIG" ? "var(--danger)" : "var(--success)";
    }

    function openEdit(index) {
        playSound();
        editingIndex = index;
        document.getElementById('edit-modal').style.display = 'flex';
    }

    function applyEdit(num) {
        playSound();
        database[editingIndex].r = num;
        updateUI();
        closeEdit();
    }

    function closeEdit() { document.getElementById('edit-modal').style.display = 'none'; }

    function updateUI() {
        localStorage.setItem('halwa_v4_db', JSON.stringify(database));
        document.getElementById('main-history').innerHTML = database.map((item, index) => `
            <div class="h-row" onclick="openEdit(${index})">
                <span style="color:#444; font-size:12px;">${item.p}</span>
                <span>
                    <b style="font-size:15px; margin-right:8px; color:${item.r >= 5 ? 'var(--danger)' : 'var(--success)'}">${item.r}</b>
                    <span class="badge" style="color:${item.r >= 5 ? 'var(--danger)' : 'var(--success)'}">${item.r >= 5 ? 'BIG' : 'SML'}</span>
                </span>
            </div>
        `).join('');
    }

    function calculateAIProgress() {
        let count = database.length;
        let total = Math.min(98, count === 0 ? 0 : 85 + Math.floor(count / 2));
        document.getElementById('meter-fill').style.width = total + "%";
        document.getElementById('ai-status').textContent = `ANALYSIS: ${total}% (INPUTS: ${count})`;
    }

    setInterval(updateSync, 1000);
    updateSync();
    updateUI();
    calculateAIProgress();
</script>
</body>
</html>
