<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Elite Predictor V5 - Neon</title>
  <style>
    :root {
      --neon-blue: #00f3ff;
      --neon-red: #ff0055;
      --neon-green: #39ff14;
      --neon-purple: #bc13fe;
    }

    body {
      margin: 0;
      background: #050a18;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      justify-content: center;
      color: white;
    }

    /* मुख्य कंटेनर और चमकीली लाइट */
    .container {
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      background: #0f172a;
      padding: 20px;
      box-sizing: border-box;
      border: 2px solid var(--neon-blue);
      box-shadow: 0 0 15px var(--neon-blue);
      position: relative;
    }

    .neon-line {
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
      margin: 10px 0;
    }

    h2 {
      text-align: center;
      color: var(--neon-blue);
      text-shadow: 0 0 10px var(--neon-blue);
      text-transform: uppercase;
      margin: 10px 0;
    }

    /* पीरियड और टाइमर सेक्शन */
    .info-box {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      border: 1px solid rgba(0, 243, 255, 0.3);
    }

    #period-id { font-size: 18px; color: #94a3b8; font-weight: bold; }
    #timer { font-size: 38px; font-weight: 900; color: #fbbf24; font-family: monospace; }

    /* प्रेडिक्शन कार्ड */
    .prediction-card {
      background: linear-gradient(145deg, #1e293b, #0f172a);
      border-radius: 20px;
      padding: 30px 10px;
      text-align: center;
      margin: 20px 0;
      border: 2px solid #334155;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    #main-result {
      font-size: 52px;
      font-weight: 900;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }

    /* इनपुट सेक्शन */
    .input-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    input {
      flex: 1;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid var(--neon-blue);
      background: #050a18;
      color: white;
      font-size: 20px;
      text-align: center;
    }

    button {
      padding: 15px 20px;
      background: var(--neon-blue);
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    /* हिस्ट्री टेबल */
    table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 13px; }
    th { color: #64748b; padding: 10px; border-bottom: 1px solid #334155; }
    td { padding: 10px; text-align: center; border-bottom: 1px solid #1e293b; }
    .win { color: var(--neon-green); font-weight: bold; }
    .loss { color: var(--neon-red); font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <h2>⚡ WINGO ELITE ⚡</h2>
  <div class="neon-line"></div>

  <div class="info-box">
    <div id="period-id">PERIOD: LOADING...</div>
    <div id="timer">00:59</div>
  </div>

  <div class="prediction-card">
    <div style="font-size: 11px; color: #94a3b8; margin-bottom: 5px;">AI PREDICTION</div>
    <div id="main-result">---</div>
    <div id="type-label" style="font-size: 14px; margin-top: 5px;">Wait for sync...</div>
  </div>

  <div style="display:flex; justify-content:space-between; padding:0 10px;">
    <span>Wins: <b id="win-count" style="color:var(--neon-green)">0</b></span>
    <span>Accuracy: <b id="acc-percent">0%</b></span>
    <span>Loss: <b id="loss-count" style="color:var(--neon-red)">0</b></span>
  </div>

  <div class="input-group">
    <input type="number" id="user-input" placeholder="Enter Result (0-9)" min="0" max="9">
    <button onclick="submitResult()">UPDATE</button>
  </div>

  <table id="history-table">
    <thead>
      <tr>
        <th>Period</th>
        <th>Number</th>
        <th>Result</th>
      </tr>
    </thead>
    <tbody id="history-body"></tbody>
  </table>

  <p style="font-size: 10px; color: #475569; text-align: center; margin-top: 20px;">
    Real-time sync based on UTC 1-min intervals.
  </p>
</div>

<script>
  let win = 0, loss = 0;
  let currentPrediction = null;

  // 1. समय और पीरियड सिंक (Real-time Logic)
  function updateTime() {
    const now = new Date();
    const utcHours = now.getUTCHours();
    const utcMinutes = now.getUTCMinutes();
    const utcSeconds = now.getUTCSeconds();

    // पीरियड नंबर का असली फॉर्मेट (YYYYMMDD + Total Minutes)
    const yyyy = now.getUTCFullYear();
    const mm = String(now.getUTCMonth() + 1).padStart(2, '0');
    const dd = String(now.getUTCDate()).padStart(2, '0');
    const totalMin = utcHours * 60 + utcMinutes;
    const periodId = `${yyyy}${mm}${dd}1000${10001 + totalMin}`;

    document.getElementById('period-id').textContent = "PERIOD: " + periodId;
    
    const secRemaining = 59 - utcSeconds;
    document.getElementById('timer').textContent = "00:" + String(secRemaining).padStart(2, '0');

    // 59वें सेकंड पर प्रेडिक्शन बदलें
    if (secRemaining === 59) generatePrediction();
  }

  // 2. भविष्यवाणी का लॉजिक (आपके रूल्स के आधार पर)
  function generatePrediction() {
    const choices = ["BIG", "SMALL", "RED", "GREEN", "VIOLET"];
    // वायलेट कम आता है इसलिए उसकी संभावना कम रखी गई है
    const weights = [0.35, 0.35, 0.12, 0.13, 0.05]; 
    
    let rand = Math.random();
    let cumulative = 0;
    for(let i=0; i<choices.length; i++) {
        cumulative += weights[i];
        if(rand < cumulative) {
            currentPrediction = choices[i];
            break;
        }
    }

    const box = document.getElementById('main-result');
    box.textContent = currentPrediction;
    
    // कलर्स सेट करना
    if(currentPrediction === "BIG") box.style.color = "var(--neon-blue)";
    if(currentPrediction === "SMALL") box.style.color = "#fbbf24";
    if(currentPrediction === "RED") box.style.color = "var(--neon-red)";
    if(currentPrediction === "GREEN") box.style.color = "var(--neon-green)";
    if(currentPrediction === "VIOLET") box.style.color = "var(--neon-purple)";
  }

  // 3. Win/Loss की गणना (आपके बताए नियमों के अनुसार)
  function submitResult() {
    const val = parseInt(document.getElementById('user-input').value);
    if(isNaN(val) || currentPrediction === null) return;

    let isWin = false;

    // आपके द्वारा दिए गए नियमों का लॉजिक
    if(currentPrediction === "SMALL" && val <= 4) isWin = true;
    else if(currentPrediction === "BIG" && val >= 5) isWin = true;
    else if(currentPrediction === "RED" && [2,4,6,8,0].includes(val)) isWin = true;
    else if(currentPrediction === "GREEN" && [1,3,7,9,5].includes(val)) isWin = true;
    else if(currentPrediction === "VIOLET" && [0,5].includes(val)) isWin = true;

    // स्पेशल केस: 0 और 5 (Violet)
    // अगर Green है और 5 आया, तो उसे भी जीत (Half Win/Win) माना जाता है
    
    if(isWin) {
      win++;
      showFeedback("SUCCESS ✅", "var(--neon-green)");
    } else {
      loss++;
      showFeedback("FAILED ❌", "var(--neon-red)");
    }

    updateStats(val, isWin);
    document.getElementById('user-input').value = "";
  }

  function updateStats(val, isWin) {
    document.getElementById('win-count').textContent = win;
    document.getElementById('loss-count').textContent = loss;
    const total = win + loss;
    document.getElementById('acc-percent').textContent = Math.round((win/total)*100) + "%";

    const tbody = document.getElementById('history-body');
    const row = tbody.insertRow(0);
    row.innerHTML = `<td>Next</td><td>${val}</td><td class="${isWin?'win':'loss'}">${isWin?'WIN':'LOSS'}</td>`;
  }

  function showFeedback(text, color) {
    const label = document.getElementById('type-label');
    label.textContent = text;
    label.style.color = color;
  }

  setInterval(updateTime, 1000);
  generatePrediction();
</script>

</body>
</html>
