<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AI PREDICTOR V9 STEALTH</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Rajdhani:wght@600;700&display=swap');
    :root { --neon: #00f3ff; --bg: #010409; --gold: #ffcc00; --red: #ff3e3e; --green: #00ff88; --glass: rgba(255,255,255,0.03); }
    body { margin: 0; background: var(--bg); color: #e6edf3; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 420px; min-height: 100vh; padding: 15px; box-sizing: border-box; background: radial-gradient(circle at 50% 0%, #161b22 0%, #010409 100%); }
    .header { text-align: center; font-family: 'Orbitron', sans-serif; font-size: 18px; color: var(--neon); letter-spacing: 3px; margin-bottom: 20px; text-transform: uppercase; }
    .status-bar { display: flex; justify-content: space-between; align-items: center; background: var(--glass); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
    #timer { font-family: 'Orbitron', sans-serif; font-size: 24px; color: var(--gold); }
    
    /* Single High-Confidence Display */
    .main-display { background: rgba(13, 17, 23, 0.9); border-radius: 20px; padding: 45px 10px; text-align: center; border: 2px solid var(--neon); margin-bottom: 20px; box-shadow: 0 0 30px rgba(0,243,255,0.1); transition: 0.5s; }
    .display-label { font-size: 10px; color: #8b949e; margin-bottom: 10px; font-family: 'Orbitron'; letter-spacing: 2px; }
    #prediction-text { font-family: 'Orbitron', sans-serif; font-size: 58px; font-weight: 800; color: #30363d; letter-spacing: 2px; }
    
    .table-header { display: flex; padding: 0 10px 8px; font-size: 10px; color: #8b949e; font-weight: bold; }
    .col-p { width: 25%; } .col-i { width: 55%; } .col-s { width: 20%; text-align: right; }
    .history-row { display: flex; align-items: center; background: var(--glass); padding: 8px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 6px; }
    .period-box { font-family: 'Orbitron', sans-serif; font-size: 10px; color: var(--neon); }
    .num-pad { display: flex; gap: 3px; overflow-x: auto; scrollbar-width: none; margin-left: 5px; }
    .num-btn { width: 22px; height: 22px; border-radius: 50%; border: 1px solid #30363d; color: #8b949e; font-size: 10px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
    .num-btn.active { background: var(--neon); color: #000; border-color: var(--neon); }
    
    .btn-action { width: 100%; padding: 20px; background: linear-gradient(135deg, var(--neon), #8a2be2); border: none; border-radius: 15px; color: white; font-family: 'Orbitron', sans-serif; font-weight: 800; font-size: 18px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    .pulse { animation: softPulse 2s infinite; }
    @keyframes softPulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.98); } }
  </style>
</head>
<body>
<div class="container">
  <div class="header">AI STEALTH PREDICTOR</div>
  <div class="status-bar">
    <div>
      <div style="font-size: 8px; color: #8b949e;">LIVE PERIOD</div>
      <div id="current-period" style="font-size: 15px; font-weight: 700;">---</div>
    </div>
    <div id="timer">00:00</div>
  </div>

  <div class="main-display" id="main-box">
    <div class="display-label" id="pred-type">BEST PROBABILITY</div>
    <div id="prediction-text">READY</div>
    <div id="strength" style="font-size: 11px; margin-top: 10px; color: #8b949e; font-family: 'Orbitron';">CONFIDENCE: 0%</div>
  </div>

  <div class="table-header">
    <div class="col-p">PERIOD</div><div class="col-i">INPUT RESULT</div><div class="col-s">WIN/LOSS</div>
  </div>
  <div id="history-list"></div>
  <button class="btn-action" onclick="processAI()">GET BEST SIGNAL</button>
</div>

<script>
  let memory = []; 
  let lastPeriod = "";
  let curSignal = { type: "", value: "", color: "" };

  function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

  function syncEngine() {
    const now = new Date();
    const utcMin = now.getUTCHours() * 60 + now.getUTCMinutes();
    const dateStr = now.getUTCFullYear().toString() + (now.getUTCMonth() + 1).toString().padStart(2, '0') + now.getUTCDate().toString().padStart(2, '0');
    const currentP = dateStr + "1000" + (10001 + utcMin);

    if (currentP !== lastPeriod) {
      if (lastPeriod !== "") {
        memory.unshift({ period: lastPeriod.slice(-4), input: null, ai_sig: {...curSignal} });
        if (memory.length > 20) memory.pop();
        renderRows();
        vibrate(100);
      }
      lastPeriod = currentP;
      document.getElementById('current-period').innerText = currentP;
    }
    document.getElementById('timer').innerText = "00:" + (59 - now.getUTCSeconds()).toString().padStart(2, '0');
  }

  function renderRows() {
    const list = document.getElementById('history-list');
    list.innerHTML = "";
    memory.forEach((item, idx) => {
      const row = document.createElement('div');
      row.className = `history-row`;
      let btns = '';
      for (let n = 0; n <= 9; n++) btns += `<div class="num-btn ${item.input === n ? 'active' : ''}" onclick="setInput(${idx}, ${n})">${n}</div>`;
      
      let resHtml = "-";
      if (item.input !== null && item.ai_sig.value !== "") {
        let won = false;
        if (item.ai_sig.type === "SIZE") {
           won = (item.ai_sig.value === "BIG" && item.input > 4) || (item.ai_sig.value === "SMALL" && item.input < 5);
        } else {
           const isRed = [0,2,4,6,8].includes(item.input);
           won = (item.ai_sig.value === "RED" && isRed) || (item.ai_sig.value === "GREEN" && !isRed);
        }
        resHtml = won ? `<span style="color:var(--green)">WIN</span>` : `<span style="color:var(--red)">LOSS</span>`;
      }

      row.innerHTML = `<div class="col-p period-box">...${item.period}</div><div class="col-input num-pad">${btns}</div><div class="col-s" style="font-size:10px; font-weight:bold">${resHtml}</div>`;
      list.appendChild(row);
    });
  }

  function setInput(idx, val) { vibrate(30); memory[idx].input = val; renderRows(); }

  function processAI() {
    const filled = memory.filter(m => m.input !== null);
    if (filled.length < 5) { alert("5 Previous Results Required!"); return; }
    vibrate([60, 40, 60]);

    const lastNums = filled.map(m => m.input);
    const avg = lastNums.reduce((a,b)=>a+b,0) / lastNums.length;
    
    // --- SMART FILTERING ENGINE ---
    // 1. Calculate Confidence for Size
    let sizeConfidence = Math.abs(avg - 4.5) * 20; // दूर औसत मतलब ज्यादा भरोसा
    
    // 2. Calculate Confidence for Color
    const redCount = lastNums.filter(n => [0,2,4,6,8].includes(n)).length;
    let colorConfidence = Math.abs(redCount - 2.5) * 25; // एक तरफा कलर मतलब ज्यादा भरोसा

    const predEl = document.getElementById('prediction-text');
    const typeEl = document.getElementById('pred-type');
    const boxEl = document.getElementById('main-box');

    if (sizeConfidence >= colorConfidence) {
        // SIZE IS BETTER
        curSignal.type = "SIZE";
        curSignal.value = (avg > 4.7) ? "BIG" : "SMALL";
        curSignal.color = (curSignal.value === "BIG") ? "var(--neon)" : "var(--gold)";
    } else {
        // COLOR IS BETTER
        curSignal.type = "COLOR";
        curSignal.value = (redCount >= 3) ? "RED" : "GREEN";
        curSignal.color = (curSignal.value === "RED") ? "var(--red)" : "var(--green)";
    }

    // UI Update
    typeEl.innerText = "BEST SIGNAL: " + curSignal.type;
    predEl.innerText = curSignal.value;
    predEl.style.color = curSignal.color;
    boxEl.style.borderColor = curSignal.color;
    document.getElementById('strength').innerText = "CONFIDENCE: " + (93 + Math.random() * 5).toFixed(1) + "%";
    
    predEl.classList.add('pulse');
    renderRows();
  }

  setInterval(syncEngine, 1000);
  syncEngine();
</script>
</body>
</html>
