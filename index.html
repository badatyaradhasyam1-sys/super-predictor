<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HALWA AI PREDICTOR PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --neon-blue: #00f2ff;
            --neon-magenta: #ff00ff;
            --quantum-glow: rgba(0, 242, 255, 0.15);
            --danger: #ef4444;
            --success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background: #010409; color: #fff; overflow: hidden; }

        .app-container {
            width: 100%; max-width: 480px; height: 100vh; margin: auto;
            background: linear-gradient(180deg, #020617 0%, #000000 100%);
            display: flex; flex-direction: column; padding: 12px; position: relative;
        }

        /* Header Style */
        .header { padding: 5px 0; }
        .super-title { font-family: 'Orbitron'; font-style: italic; font-size: 16px; color: #fff; opacity: 0.8; }
        .halwa-title { 
            font-family: 'Orbitron'; font-size: 26px; color: var(--neon-blue); 
            text-shadow: 0 0 15px var(--neon-blue); text-align: center; margin: 10px 0;
            letter-spacing: 2px;
        }

        /* Sync Card */
        .sync-card {
            background: rgba(15, 23, 42, 0.5); margin-bottom: 10px; padding: 12px;
            border-radius: 12px; border: 1px solid rgba(0, 242, 255, 0.1);
            display: flex; justify-content: space-between; align-items: center;
        }
        .period-info p { font-size: 10px; color: #64748b; text-transform: uppercase; }
        #period-no { font-family: 'Orbitron'; font-size: 13px; color: #f8fafc; font-weight: bold; }
        #timer { font-family: 'Orbitron'; font-size: 24px; color: #ffcc00; font-weight: 900; }

        /* Quantum Display with Animation */
        .quantum-display {
            background: rgba(0, 0, 0, 0.4); border: 1px solid var(--neon-blue); border-radius: 20px;
            padding: 35px 15px; text-align: center; position: relative; overflow: hidden;
            box-shadow: inset 0 0 30px var(--quantum-glow); margin-bottom: 15px;
        }
        
        .quantum-display::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(rgba(0,242,255,0.05) 1px, transparent 1px), 
                        linear-gradient(90deg, rgba(0,242,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px; z-index: -1;
        }

        #prediction-output { 
            font-family: 'Orbitron'; font-size: 55px; font-weight: 900; 
            color: rgba(255,255,255,0.1); letter-spacing: 5px; transition: 0.3s;
        }

        /* 5-Sec Blink Animation */
        .blink-red {
            color: var(--danger) !important;
            text-shadow: 0 0 25px var(--danger);
            animation: pulse 0.6s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; }
        }

        .stability-tag { font-size: 9px; letter-spacing: 2px; color: var(--neon-blue); margin-top: 10px; opacity: 0.8; }

        /* Keypad */
        .keypad-label { font-size: 10px; color: #475569; margin-bottom: 8px; text-align: center; letter-spacing: 1px; }
        .input-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; }
        .key-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px; padding: 15px 0; color: #fff; font-size: 18px; font-weight: bold;
            cursor: pointer; transition: 0.1s;
        }
        .key-btn:active { background: var(--neon-blue); color: #000; transform: scale(0.9); }

        /* History */
        .history-section { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .history-list { overflow-y: auto; scrollbar-width: none; }
        .history-list::-webkit-scrollbar { display: none; }
        .h-row { 
            display: flex; justify-content: space-between; padding: 12px; 
            border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 13px; 
        }

        /* Setup Popup */
        #setup-overlay {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
        #setup-target { color: #ffcc00; font-size: 18px; margin: 20px 0; font-family: 'Orbitron'; }

        .badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; }
        .big-tag { background: var(--danger); }
        .small-tag { background: var(--success); }
    </style>
</head>
<body>

<div id="setup-overlay">
    <h2 style="color: var(--neon-blue); letter-spacing: 2px;">HISTORY FEED</h2>
    <p style="font-size: 12px; color: #64748b; margin-top: 5px;">ENTER LAST 10 RESULTS QUICKLY</p>
    <div id="setup-target">PERIOD: ----</div>
    <div class="input-grid" style="width: 100%; max-width: 350px;">
        <script>
            for(let i=0; i<=9; i++) {
                document.write(`<button class="key-btn" onclick="rapidFeed(${i})">${i}</button>`);
            }
        </script>
    </div>
</div>

<div class="app-container">
    <div class="header">
        <div class="super-title">Super Predictor</div>
        <div class="halwa-title">HALWA AI</div>
    </div>

    <div class="sync-card">
        <div class="period-info">
            <p>Live Period</p>
            <div id="period-no">--------</div>
        </div>
        <div id="timer">00:00</div>
    </div>

    <div class="quantum-display">
        <div id="prediction-output">SCN...</div>
        <div class="stability-tag" id="ai-status">STABILITY: 0%</div>
    </div>

    <div class="keypad-label">DIRECT RESULT INPUT</div>
    <div class="input-grid">
        <script>
            for(let i=0; i<=9; i++) {
                document.write(`<button class="key-btn" onclick="directInput(${i})">${i}</button>`);
            }
        </script>
    </div>

    <div class="history-section">
        <div style="display:flex; justify-content:space-between; font-size:10px; color:#475569; padding:5px 10px;">
            <span>PERIOD</span>
            <span>RESULT / TYPE</span>
        </div>
        <div class="history-list" id="history-data"></div>
    </div>
</div>

<audio id="clickSound" src="https://www.soundjay.com/buttons/beep-01a.mp3" preload="auto"></audio>

<script>
    let database = JSON.parse(localStorage.getItem('halwa_final_db')) || [];
    let currentPeriod = "";
    let feedPointer = 0;
    const clickSound = document.getElementById('clickSound');

    function playSound() {
        clickSound.currentTime = 0;
        clickSound.play().catch(() => {}); // Play only after user interaction
    }

    // --- 1. Jalwa Sync Logic (Updated for 2026 match) ---
    function updateSync() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        
        // Jalwa Wingo 1-min formula
        const totalMinutesToday = now.getHours() * 60 + now.getMinutes();
        const sequence = 100010000 + totalMinutesToday; 
        
        currentPeriod = `${y}${m}${d}${sequence}`;
        document.getElementById('period-no').textContent = currentPeriod;

        const sec = now.getSeconds();
        const rem = 59 - sec;
        const timerEl = document.getElementById('timer');
        const outputEl = document.getElementById('prediction-output');
        
        timerEl.textContent = `00:${rem < 10 ? '0' + rem : rem}`;

        // 5-Sec Blink Logic
        if (rem <= 5) {
            outputEl.classList.add('blink-red');
            outputEl.textContent = "SCN...";
        } else {
            outputEl.classList.remove('blink-red');
            if (outputEl.textContent === "SCN..." && database.length >= 10) {
                processAI();
            }
        }
    }

    // --- 2. Rapid Feed Logic (Initial 10 Rounds) ---
    function startSetup() {
        if (database.length < 10) {
            document.getElementById('setup-overlay').style.display = 'flex';
            setSetupText();
        } else {
            refreshView();
        }
    }

    function setSetupText() {
        let prev = String(BigInt(currentPeriod) - BigInt(feedPointer + 1));
        document.getElementById('setup-target').textContent = `PERIOD: ${prev.slice(-4)}`;
    }

    function rapidFeed(num) {
        playSound();
        let prev = String(BigInt(currentPeriod) - BigInt(feedPointer + 1));
        database.push({ p: prev, r: num });
        feedPointer++;

        if (feedPointer >= 10) {
            document.getElementById('setup-overlay').style.display = 'none';
            database.sort((a, b) => b.p - a.p);
            save();
        } else {
            setSetupText();
        }
    }

    // --- 3. Direct Input ---
    function directInput(num) {
        playSound();
        let lastP = String(BigInt(currentPeriod) - 1n);
        
        if (database[0] && database[0].p === lastP) return;

        database.unshift({ p: lastP, r: num });
        if (database.length > 100) database.pop();
        save();
    }

    // --- 4. Quantum AI Processing ---
    function processAI() {
        const out = document.getElementById('prediction-output');
        const status = document.getElementById('ai-status');

        status.textContent = "QUANTUM NEURAL PROCESSING...";
        
        setTimeout(() => {
            // Trend logic from 10 rounds
            let last5 = database.slice(0, 5).reduce((acc, val) => acc + val.r, 0);
            let result = (last5 / 5 > 4.5) ? "SMALL" : "BIG";
            let stability = 85 + Math.floor(Math.random() * 12);

            out.textContent = result;
            out.style.color = (result === "BIG") ? "var(--danger)" : "var(--success)";
            out.style.textShadow = `0 0 20px ${(result === "BIG") ? "#ef444499" : "#22c55e99"}`;
            status.textContent = `STABILITY: ${stability}%`;
        }, 800);
    }

    function refreshView() {
        const list = document.getElementById('history-data');
        list.innerHTML = database.map(item => `
            <div class="h-row">
                <span style="color: #64748b; font-family: 'Orbitron'">${item.p}</span>
                <span>
                    <b style="margin-right: 12px; font-size: 15px;">${item.r}</b>
                    <span class="badge ${item.r >= 5 ? 'big-tag' : 'small-tag'}">${item.r >= 5 ? 'BIG' : 'SML'}</span>
                </span>
            </div>
        `).join('');
    }

    function save() {
        localStorage.setItem('halwa_final_db', JSON.stringify(database));
        refreshView();
    }

    setInterval(updateSync, 1000);
    updateSync();
    startSetup();
</script>

</body>
</html>
