<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Predictor</title>
    <style>
        /* आपके App का लुक और फील यहाँ है */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a; /* डार्क बैकग्राउंड */
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            width: 100%;
            padding: 15px;
            background-color: #000;
            text-align: left;
            font-weight: bold;
            font-style: italic;
            border-bottom: 2px solid #333;
        }
        .container {
            padding: 20px;
            text-align: center;
            margin-top: 50px;
        }
        .main-button {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }
        .main-button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="header">
        Super Predictor
    </div>

    <div class="container">
        <h1>स्वागत है!</h1>
        <p>आपका App अब तैयार है।</p>
        
        <button class="main-button">Dashboard खोलें</button>
    </div>

</body>
</html>
