<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Super Predictor Pro AI</title>
  <style>
    :root {
      --neon: #00f3ff;
      --bg: #020617;
      --glass: rgba(255, 255, 255, 0.05);
      --gold: #fbbf24;
      --purple: #bc13fe;
    }
    body {
      margin: 0; background: var(--bg); color: white;
      font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center;
      overflow-x: hidden;
    }
    .container {
      width: 100%; max-width: 420px; min-height: 100vh;
      padding: 15px; box-sizing: border-box;
      border: 1px solid rgba(0,243,255,0.2);
      background: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
    }
    .header {
      text-align: center; font-size: 26px; font-weight: 900;
      letter-spacing: 4px; color: var(--neon);
      text-shadow: 0 0 15px var(--neon); margin: 15px 0;
    }

    /* Status Bar */
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--glass); padding: 12px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;
    }
    #timer { font-size: 32px; color: var(--gold); font-weight: bold; font-family: monospace; }

    /* Unique Prediction Display */
    .prediction-area {
      position: relative; padding: 30px; margin-bottom: 25px;
      background: rgba(15, 23, 42, 0.8); border-radius: 20px;
      border: 2px solid var(--neon); overflow: hidden;
      text-align: center; transition: 0.5s;
    }
    .prediction-area::before {
      content: ''; position: absolute; top: -50%; left: -50%;
      width: 200%; height: 200%; background: conic-gradient(transparent, transparent, transparent, var(--neon));
      animation: rotate 4s linear infinite; z-index: -1;
    }
    @keyframes rotate { 100% { transform: rotate(360deg); } }
    
    #prediction-text {
      font-size: 45px; font-weight: 900; color: #64748b;
      letter-spacing: 5px; text-transform: uppercase;
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .active-pred { color: var(--neon) !important; text-shadow: 0 0 20px var(--neon); transform: scale(1.1); }

    /* History Grid */
    .history-section { display: flex; flex-direction: column; gap: 10px; }
    .history-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--glass); padding: 8px 12px; border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
    }
    .circle-no {
      width: 35px; height: 35px; border-radius: 50%;
      background: var(--neon); color: #000; display: flex;
      justify-content: center; align-items: center; font-weight: bold;
      cursor: pointer; box-shadow: 0 0 10px var(--neon);
    }
    .special-10 { background: var(--purple) !important; color: white !important; box-shadow: 0 0 15px var(--purple); }
    
    .period-info { flex: 1; font-size: 11px; color: #94a3b8; font-family: monospace; }
    
    .num-pad { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; }
    .num-btn {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid var(--neon); color: var(--neon);
      font-size: 12px; cursor: pointer; display: flex;
      justify-content: center; align-items: center; transition: 0.2s;
    }
    .num-btn.selected { background: var(--neon); color: #000; font-weight: bold; transform: scale(1.2); }

    .btn-action {
      width: 100%; padding: 18px; margin-top: 25px;
      background: linear-gradient(90deg, var(--neon), var(--purple));
      border: none; border-radius: 15px; color: white;
      font-weight: bold; font-size: 18px; cursor: pointer;
      text-transform: uppercase; letter-spacing: 2px;
      box-shadow: 0 5px 20px rgba(188, 19, 254, 0.4);
    }
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">SUPER PREDICTOR</div>

  <div class="status-bar">
    <div>
      <div style="font-size: 10px; color: #94a3b8;">LIVE PERIOD</div>
      <div id="current-p" style="font-size: 18px; font-weight: bold;">---</div>
    </div>
    <div id="timer">00:00</div>
  </div>

  <div class="prediction-area">
    <div style="font-size: 11px; color: var(--gold); letter-spacing: 2px; margin-bottom: 8px;">AI NEXT SIGNAL</div>
    <div id="prediction-text">WAITING</div>
  </div>

  <div id="history-list" class="history-section">
    </div>

  <button class="btn-action" onclick="generateSmartResult()">Better Result</button>
</div>

<script>
  let historyData = new Array(20).fill(null);
  let lastPeriod = 0;
  let showFull = false;
  let isCollapsed = false;

  function init() {
    updateSystem();
    setInterval(updateSystem, 1000);
  }

  function updateSystem() {
    const now = new Date();
    const utcHours = now.getUTCHours();
    const utcMinutes = now.getUTCMinutes();
    const utcSeconds = now.getUTCSeconds();

    const dateStr = now.getUTCFullYear().toString() + 
                    (now.getUTCMonth()+1).toString().padStart(2,'0') + 
                    now.getUTCDate().toString().padStart(2,'0');
    
    const totalMin = utcHours * 60 + utcMinutes;
    const currentP = parseInt(dateStr + "1000" + (10001 + totalMin));
    
    document.getElementById('current-p').innerText = currentP;
    document.getElementById('timer').innerText = "00:" + (59 - utcSeconds).toString().padStart(2,'0');

    // ** AUTO-SHIFT LOGIC **
    if (lastPeriod !== 0 && currentP > lastPeriod) {
        for (let i = 19; i > 0; i--) {
            historyData[i] = historyData[i-1];
        }
        historyData[0] = null; // New round, clear 1st input
    }
    lastPeriod = currentP;
    render();
  }

  function render() {
    const list = document.getElementById('history-list');
    list.innerHTML = "";
    
    // Logic: 1 show (collapsed), 10 show (default), 20 show (expanded)
    let limit = isCollapsed ? 1 : (showFull ? 20 : 10);

    for (let i = 0; i < limit; i++) {
      const row = document.createElement('div');
      row.className = `history-row`;
      
      let pads = '';
      for(let n=0; n<=9; n++) {
        const selected = historyData[i] === n ? 'selected' : '';
        pads += `<div class="num-btn ${selected}" onclick="setVal(${i}, ${n})">${n}</div>`;
      }

      // 10 Number Icon Special Color
      const circleClass = (i === 9) ? "circle-no special-10" : "circle-no";

      row.innerHTML = `
        <div class="${circleClass}" onclick="handleCircleClick(${i})">${i + 1}</div>
        <div class="period-info">P: ${lastPeriod - (i + 1)}</div>
        <div class="num-pad">${pads}</div>
      `;
      list.appendChild(row);
    }
  }

  function handleCircleClick(idx) {
    if(idx === 0) {
      isCollapsed = !isCollapsed;
    } else if (idx === 9) {
      showFull = !showFull; // Toggle 10 to 20
    }
    render();
  }

  function setVal(idx, val) {
    historyData[idx] = val;
    render();
  }

  function generateSmartResult() {
    const data = historyData.filter(v => v !== null);
    if(data.length < 3) {
      alert("AI Analysis requires at least 3 historical inputs!");
      return;
    }

    const predEl = document.getElementById('prediction-text');
    predEl.classList.remove('active-pred');
    
    // Advanced Logic
    setTimeout(() => {
        const avg = data.reduce((a, b) => a + b, 0) / data.length;
        let res = (avg > 4.4) ? "BIG" : "SMALL";
        
        predEl.innerText = res;
        predEl.classList.add('active-pred');
        
        // Auto-collapse for professional look
        isCollapsed = true;
        render();
    }, 300);
  }

  init();
</script>
</body>
</html>
