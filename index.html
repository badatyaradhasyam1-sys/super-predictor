<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Super Predictor Pro AI - V2</title>
  <style>
    :root {
      --neon: #00f3ff;
      --bg: #020617;
      --glass: rgba(255, 255, 255, 0.05);
      --purple: #bc13fe;
      --red: #ff4d4d;
      --green: #2ecc71;
    }
    body {
      margin: 0; background: var(--bg); color: white;
      font-family: 'Segoe UI', Roboto, sans-serif; display: flex; justify-content: center;
    }
    .container {
      width: 100%; max-width: 420px; min-height: 100vh;
      padding: 15px; box-sizing: border-box;
      background: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
    }
    .header {
      text-align: center; font-size: 26px; font-weight: 900;
      letter-spacing: 3px; color: var(--neon);
      text-shadow: 0 0 15px var(--neon); margin: 15px 0;
    }
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--glass); padding: 12px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;
    }
    #timer { font-size: 32px; color: #fbbf24; font-weight: bold; }

    .main-display {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      border-radius: 20px; padding: 40px 20px; text-align: center;
      border: 2px solid var(--neon); box-shadow: 0 0 25px rgba(0, 243, 255, 0.2);
      margin-bottom: 20px; position: relative; overflow: hidden;
    }
    
    /* Result Animation Classes */
    #prediction-text { 
      font-size: 48px; font-weight: 900; color: #64748b; 
      letter-spacing: 3px; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .result-glow {
      animation: zoomGlow 0.8s ease-out forwards;
    }
    @keyframes zoomGlow {
      0% { transform: scale(0.5); opacity: 0; filter: blur(10px); }
      100% { transform: scale(1.1); opacity: 1; filter: blur(0); text-shadow: 0 0 20px currentColor; }
    }

    .history-section { display: flex; flex-direction: column; gap: 10px; }
    .history-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--glass); padding: 8px 12px; border-radius: 50px;
      border: 1px solid rgba(0, 243, 255, 0.2);
    }
    .circle-no {
      width: 35px; height: 35px; border-radius: 50%;
      background: var(--neon); color: #000; display: flex;
      justify-content: center; align-items: center; font-weight: bold;
    }
    .num-pad { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; }
    .num-btn {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid var(--neon); color: var(--neon); 
      font-size: 12px; display: flex; justify-content: center; align-items: center;
    }
    .num-btn.active { background: var(--neon); color: #000; box-shadow: 0 0 10px var(--neon); }

    .btn-action {
      width: 100%; padding: 18px; margin-top: 20px;
      background: linear-gradient(90deg, var(--neon), var(--purple));
      border: none; border-radius: 15px; color: white;
      font-weight: bold; font-size: 18px; cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">SUPER PREDICTOR</div>

  <div class="status-bar">
    <div>
      <div style="font-size: 10px; color: #94a3b8;">PERIOD</div>
      <div id="current-period" style="font-size: 16px; font-weight: bold;">---</div>
    </div>
    <div id="timer">00:00</div>
  </div>

  <div class="main-display">
    <div style="font-size: 11px; letter-spacing: 2px; color: #94a3b8; margin-bottom: 5px;">AI SIGNAL STRENGTH: <span id="strength">LOW</span></div>
    <div id="prediction-text">WAITING...</div>
  </div>

  <div id="history-list" class="history-section"></div>

  <button class="btn-action" onclick="processAI()">BETTER RESULT</button>
</div>

<script>
  let historyData = new Array(10).fill(null);
  let isCollapsed = false;

  function init() {
    updateClock();
    setInterval(updateClock, 1000);
    renderRows();
  }

  function vibrate(ms = 50) {
    if (navigator.vibrate) navigator.vibrate(ms);
  }

  function updateClock() {
    const now = new Date();
    const dateStr = now.getUTCFullYear().toString() + (now.getUTCMonth()+1).toString().padStart(2,'0') + now.getUTCDate().toString().padStart(2,'0');
    const totalMin = now.getUTCHours() * 60 + now.getUTCMinutes();
    const currentPeriodNo = parseInt(dateStr + "1000" + (10001 + totalMin));
    
    document.getElementById('current-period').innerText = currentPeriodNo;
    document.getElementById('timer').innerText = "00:" + (59 - now.getUTCSeconds()).toString().padStart(2,'0');
  }

  function renderRows() {
    const list = document.getElementById('history-list');
    list.innerHTML = "";
    const limit = isCollapsed ? 1 : 10;

    for (let i = 0; i < limit; i++) {
      const row = document.createElement('div');
      row.className = `history-row`;
      let numPadHTML = '';
      for(let n=0; n<=9; n++) {
        const isActive = historyData[i] === n ? 'active' : '';
        numPadHTML += `<div class="num-btn ${isActive}" onclick="setInput(${i}, ${n})">${n}</div>`;
      }
      row.innerHTML = `<div class="circle-no" onclick="toggleView()">${i + 1}</div><div class="num-pad">${numPadHTML}</div>`;
      list.appendChild(row);
    }
  }

  function setInput(index, val) {
    vibrate(30);
    historyData[index] = val;
    renderRows();
  }

  function toggleView() {
    isCollapsed = !isCollapsed;
    renderRows();
  }

  function processAI() {
    vibrate(60);
    const filledData = historyData.filter(v => v !== null);
    if(filledData.length < 3) {
      alert("कम से कम 3 नंबर भरें!");
      return;
    }

    const predEl = document.getElementById('prediction-text');
    const strengthEl = document.getElementById('strength');
    
    // Animation Reset
    predEl.classList.remove('result-glow');
    void predEl.offsetWidth; // Trigger reflow
    predEl.classList.add('result-glow');

    // --- Advanced Logic ---
    const lastNum = filledData[0];
    const sum = filledData.reduce((a, b) => a + b, 0);
    const avg = sum / filledData.length;
    
    // Size Logic
    let sizeResult = (avg > 4.5) ? "BIG" : "SMALL";
    
    // Color Logic (Based on traditional patterns)
    let colorResult = "";
    if([1,3,7,9].includes(lastNum)) colorResult = "GREEN";
    else if([2,4,6,8].includes(lastNum)) colorResult = "RED";
    else if(lastNum === 0) colorResult = "RED+V";
    else colorResult = "GREEN+V";

    // Strength & Selection Logic
    // अगर औसत बहुत ज़्यादा या कम है, तो SIZE दिखाओ, वरना COLOR दिखाओ
    if (avg > 7 || avg < 2.5) {
      predEl.innerText = sizeResult;
      predEl.style.color = (sizeResult === "BIG") ? "var(--neon)" : "#fbbf24";
      strengthEl.innerText = "HIGH (SIZE)";
    } else {
      predEl.innerText = colorResult;
      predEl.style.color = (colorResult.includes("RED")) ? "var(--red)" : "var(--green)";
      strengthEl.innerText = "STABLE (COLOR)";
    }

    isCollapsed = true;
    renderRows();
  }

  init();
</script>
</body>
</html>
