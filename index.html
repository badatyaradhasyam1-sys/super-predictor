<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Super Predictor Pro AI - V5 (Fixed)</title>
  <style>
    :root {
      --neon: #00f3ff;
      --bg: #020617;
      --glass: rgba(255, 255, 255, 0.05);
      --purple: #bc13fe;
      --red: #ff4d4d;
      --green: #2ecc71;
    }
    body {
      margin: 0; background: var(--bg); color: white;
      font-family: 'Segoe UI', Roboto, sans-serif; display: flex; justify-content: center;
    }
    .container {
      width: 100%; max-width: 420px; min-height: 100vh;
      padding: 15px; box-sizing: border-box;
      background: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
    }
    .header {
      text-align: center; font-size: 26px; font-weight: 900;
      letter-spacing: 3px; color: var(--neon);
      text-shadow: 0 0 15px var(--neon); margin: 15px 0;
    }
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--glass); padding: 12px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;
    }
    #timer { font-size: 32px; color: #fbbf24; font-weight: bold; font-family: monospace; }

    .main-display {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      border-radius: 20px; padding: 40px 20px; text-align: center;
      border: 2px solid var(--neon); box-shadow: 0 0 25px rgba(0, 243, 255, 0.2);
      margin-bottom: 20px;
    }
    
    #prediction-text { 
      font-size: 48px; font-weight: 900; color: #64748b; 
      letter-spacing: 3px; transition: all 0.4s ease;
    }

    .result-glow { animation: zoomInGlow 0.6s forwards; }
    @keyframes zoomInGlow {
      0% { transform: scale(0.3); opacity: 0; }
      100% { transform: scale(1); opacity: 1; text-shadow: 0 0 30px currentColor; }
    }

    .history-section { display: flex; flex-direction: column; gap: 8px; }
    .history-row {
      display: flex; align-items: center; gap: 8px;
      background: var(--glass); padding: 6px 10px; border-radius: 50px;
      border: 1px solid rgba(0, 243, 255, 0.1);
    }
    .circle-no {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--neon); color: #000; display: flex;
      justify-content: center; align-items: center; font-weight: bold; font-size: 13px;
      flex-shrink: 0; cursor: pointer;
    }
    .num-pad { display: flex; gap: 3px; overflow-x: auto; scrollbar-width: none; }
    .num-btn {
      width: 26px; height: 26px; border-radius: 50%;
      border: 1px solid var(--neon); color: var(--neon); 
      font-size: 11px; display: flex; justify-content: center; align-items: center;
      flex-shrink: 0;
    }
    .num-btn.active { background: var(--neon); color: #000; box-shadow: 0 0 8px var(--neon); }

    .btn-action {
      width: 100%; padding: 18px; margin-top: 20px;
      background: linear-gradient(90deg, var(--neon), var(--purple));
      border: none; border-radius: 15px; color: white;
      font-weight: bold; font-size: 18px; cursor: pointer;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">SUPER PREDICTOR</div>

  <div class="status-bar">
    <div>
      <div style="font-size: 9px; color: #94a3b8; letter-spacing: 1px;">PERIOD NO</div>
      <div id="current-period" style="font-size: 16px; font-weight: bold;">---</div>
    </div>
    <div id="timer">00:00</div>
  </div>

  <div class="main-display">
    <div style="font-size: 10px; color: #94a3b8; margin-bottom: 5px;">AI STRENGTH: <span id="strength">---</span></div>
    <div id="prediction-text">WAITING DATA</div>
  </div>

  <div id="history-list" class="history-section"></div>

  <button class="btn-action" onclick="processAI()">Get AI Signal</button>
</div>

<script>
  let historyData = new Array(20).fill(null);
  let isExpanded = false; // अवस्था ट्रैक करने के लिए
  let lastPeriod = "";

  function vibrate(ms) {
    if (navigator.vibrate) navigator.vibrate(ms);
  }

  function updateTimerAndPeriod() {
    const now = new Date();
    const seconds = now.getUTCSeconds();
    const remainingSeconds = 59 - seconds;

    const dateStr = now.getUTCFullYear().toString() + (now.getUTCMonth() + 1).toString().padStart(2, '0') + now.getUTCDate().toString().padStart(2, '0');
    const totalMinutes = now.getUTCHours() * 60 + now.getUTCMinutes();
    const currentPeriod = dateStr + "1000" + (10001 + totalMinutes);

    if (currentPeriod !== lastPeriod) {
      if(lastPeriod !== "") {
        for (let i = 19; i > 0; i--) {
          historyData[i] = historyData[i-1];
        }
        historyData[0] = null; 
        renderRows();
      }
      lastPeriod = currentPeriod;
      document.getElementById('current-period').innerText = currentPeriod;
      vibrate(100);
    }
    document.getElementById('timer').innerText = "00:" + remainingSeconds.toString().padStart(2, '0');
  }

  function renderRows() {
    const list = document.getElementById('history-list');
    list.innerHTML = "";
    
    let limit = isExpanded ? 20 : 1;

    for (let i = 0; i < limit; i++) {
      const row = document.createElement('div');
      row.className = `history-row`;
      let numPadHTML = '';
      for(let n=0; n<=9; n++) {
        const isActive = historyData[i] === n ? 'active' : '';
        numPadHTML += `<div class="num-btn ${isActive}" onclick="setInput(${i}, ${n})">${n}</div>`;
      }
      
      let clickAction = "";
      // 1 नंबर क्लिक करने पर टॉगल होगा (खुलेगा या बंद होगा)
      if (i === 0) clickAction = `onclick="toggleView('toggle')"`;
      // 10 नंबर क्लिक करने पर हमेशा पूरा खुलेगा
      if (i === 9) clickAction = `onclick="toggleView('expand')"`;

      row.innerHTML = `<div class="circle-no" ${clickAction}>${i + 1}</div><div class="num-pad">${numPadHTML}</div>`;
      list.appendChild(row);
    }
  }

  function toggleView(mode) {
    vibrate(40);
    if (mode === 'toggle') {
      isExpanded = !isExpanded; // अगर बंद है तो खुलेगा, खुला है तो बंद होगा
    } else if (mode === 'expand') {
      isExpanded = true; // हमेशा एक्सपैंड होगा
    }
    renderRows();
  }

  function setInput(index, val) {
    vibrate(30);
    historyData[index] = val;
    renderRows();
  }

  function processAI() {
    vibrate(60);
    const filledData = historyData.filter(v => v !== null);
    if(filledData.length < 3) {
      alert("कृपया कम से कम 3 नंबर भरें!");
      return;
    }

    const predEl = document.getElementById('prediction-text');
    const strengthEl = document.getElementById('strength');
    
    predEl.classList.remove('result-glow');
    void predEl.offsetWidth; 
    predEl.classList.add('result-glow');

    const avg = filledData.reduce((a, b) => a + b, 0) / filledData.length;
    const lastNum = filledData[0];

    if (avg > 7.5 || avg < 2.5) {
      let size = (avg > 5) ? "BIG" : "SMALL";
      predEl.innerText = size;
      predEl.style.color = (size === "BIG") ? "var(--neon)" : "#fbbf24";
      strengthEl.innerText = "99% (SIZE)";
    } else {
      let color = ([1,3,7,9].includes(lastNum)) ? "GREEN" : "RED";
      if(lastNum === 0 || lastNum === 5) color += "+V";
      predEl.innerText = color;
      predEl.style.color = (color.includes("RED")) ? "var(--red)" : "var(--green)";
      strengthEl.innerText = "94% (COLOR)";
    }

    isExpanded = false; // रिजल्ट के बाद वापस छोटा कर दें
    renderRows();
  }

  setInterval(updateTimerAndPeriod, 1000);
  updateTimerAndPeriod();
  renderRows();
</script>
</body>
</html>
