<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Super Predictor Pro AI</title>
  <style>
    :root {
      --neon: #00f3ff;
      --bg: #020617;
      --glass: rgba(255, 255, 255, 0.05);
      --purple: #bc13fe;
    }
    body {
      margin: 0; background: var(--bg); color: white;
      font-family: 'Segoe UI', Roboto, sans-serif; display: flex; justify-content: center;
    }
    .container {
      width: 100%; max-width: 420px; min-height: 100vh;
      padding: 15px; box-sizing: border-box;
      background: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
      border: 1px solid rgba(0, 243, 255, 0.1);
    }
    .header {
      text-align: center; font-size: 26px; font-weight: 900;
      letter-spacing: 3px; color: var(--neon);
      text-shadow: 0 0 15px var(--neon); margin: 15px 0;
    }
    /* Timer & Period Section */
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--glass); padding: 12px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;
    }
    #timer { font-size: 32px; color: #fbbf24; font-weight: bold; }

    /* Prediction Main Box */
    .main-display {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      border-radius: 20px; padding: 30px; text-align: center;
      border: 2px solid var(--neon); box-shadow: 0 0 25px rgba(0, 243, 255, 0.2);
      margin-bottom: 20px;
    }
    #prediction-text { font-size: 42px; font-weight: 900; color: #64748b; letter-spacing: 2px; }

    /* History Grid System */
    .history-section { display: flex; flex-direction: column; gap: 10px; transition: 0.5s; }
    .history-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--glass); padding: 8px 12px; border-radius: 50px;
      border: 1px solid rgba(0, 243, 255, 0.2);
    }
    .circle-no {
      width: 35px; height: 35px; border-radius: 50%;
      background: var(--neon); color: #000; display: flex;
      justify-content: center; align-items: center; font-weight: bold;
      cursor: pointer; box-shadow: 0 0 10px var(--neon);
    }
    .period-info { flex: 1; font-size: 11px; color: #94a3b8; font-family: monospace; }
    
    /* Number Pad Inside Row */
    .num-pad { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; }
    .num-btn {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid var(--neon); background: transparent;
      color: var(--neon); font-size: 12px; cursor: pointer;
      display: flex; justify-content: center; align-items: center;
    }
    .num-btn.active { background: var(--neon); color: #000; }

    /* Bottom Action Button */
    .btn-action {
      width: 100%; padding: 18px; margin-top: 20px;
      background: linear-gradient(90deg, var(--neon), var(--purple));
      border: none; border-radius: 15px; color: white;
      font-weight: bold; font-size: 18px; cursor: pointer;
      box-shadow: 0 5px 20px rgba(188, 19, 254, 0.3);
    }

    /* Animation */
    .hidden { display: none !important; }
    .fade-in { animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>

<div class="container">
  <div class="header">SUPER PREDICTOR</div>

  <div class="status-bar">
    <div>
      <div id="p-id" style="font-size: 10px; color: #94a3b8;">PERIOD</div>
      <div id="current-period" style="font-size: 16px; font-weight: bold;">---</div>
    </div>
    <div id="timer">00:00</div>
  </div>

  <div class="main-display">
    <div style="font-size: 11px; letter-spacing: 2px; color: #94a3b8; margin-bottom: 5px;">AI SIGNAL</div>
    <div id="prediction-text">WAITING DATA</div>
  </div>

  <div id="history-list" class="history-section">
    </div>

  <button class="btn-action" id="boost-btn" onclick="processAI()">BETTER RESULT</button>
</div>

<script>
  let historyData = new Array(20).fill(null);
  let currentPeriodNo = 0;
  let isCollapsed = false;

  function init() {
    updateClock();
    setInterval(updateClock, 1000);
    renderRows();
  }

  function updateClock() {
    const now = new Date();
    const utcHours = now.getUTCHours();
    const utcMinutes = now.getUTCMinutes();
    const utcSeconds = now.getUTCSeconds();

    const dateStr = now.getUTCFullYear().toString() + 
                    (now.getUTCMonth()+1).toString().padStart(2,'0') + 
                    now.getUTCDate().toString().padStart(2,'0');
    
    const totalMin = utcHours * 60 + utcMinutes;
    currentPeriodNo = parseInt(dateStr + "1000" + (10001 + totalMin));
    
    document.getElementById('current-period').innerText = currentPeriodNo;
    document.getElementById('timer').innerText = "00:" + (59 - utcSeconds).toString().padStart(2,'0');

    // Auto-update labels if period changes
    if(utcSeconds === 0) renderRows();
  }

  function renderRows() {
    const list = document.getElementById('history-list');
    list.innerHTML = "";
    
    // Show only 1st row if collapsed, otherwise show all
    const limit = isCollapsed ? 1 : 20;

    for (let i = 0; i < limit; i++) {
      const row = document.createElement('div');
      row.className = `history-row fade-in`;
      
      let numPadHTML = '';
      for(let n=0; n<=9; n++) {
        const isActive = historyData[i] === n ? 'active' : '';
        numPadHTML += `<div class="num-btn ${isActive}" onclick="setInput(${i}, ${n})">${n}</div>`;
      }

      row.innerHTML = `
        <div class="circle-no" onclick="toggleView(${i})">${i + 1}</div>
        <div class="period-info">P: ${currentPeriodNo - (i + 1)}</div>
        <div class="num-pad">${numPadHTML}</div>
      `;
      list.appendChild(row);
    }
  }

  function setInput(index, val) {
    historyData[index] = val;
    renderRows();
    checkAutoSignal();
  }

  function toggleView(index) {
    if(index === 0) {
      isCollapsed = !isCollapsed;
      renderRows();
    }
  }

  function checkAutoSignal() {
    // Check if first 10 rows have input
    const first10Filled = historyData.slice(0, 10).every(v => v !== null);
    if(first10Filled) {
      processAI(); // Automatically trigger signal
    }
  }

  function processAI() {
    const filledData = historyData.filter(v => v !== null);
    if(filledData.length < 5) {
      alert("कृपया कम से कम 5 इनपुट भरें!");
      return;
    }

    const sum = filledData.reduce((a, b) => a + b, 0);
    const avg = sum / filledData.length;
    
    // Advanced calculation logic
    let res = (avg > 4.4) ? "BIG" : "SMALL";
    const predEl = document.getElementById('prediction-text');
    predEl.innerText = res;
    predEl.style.color = (res === "BIG") ? "var(--neon)" : "#fbbf24";
    
    // Collapsing for professional look after result
    isCollapsed = true;
    renderRows();
  }

  init();
</script>
</body>
</html>
