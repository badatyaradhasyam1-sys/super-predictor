<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Super Predictor AI - Final Stable</title>
    <style>
        :root {
            --bg: #0b1426; --neon: #00f3ff; --gold: #ffcc00;
            --red: #ff4d4d; --green: #2ecc71; --purple: #9b59b6;
        }
        body {
            margin: 0; background-color: var(--bg); color: white;
            font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center;
        }
        .container {
            width: 100%; max-width: 420px; min-height: 100vh; padding: 15px;
            background: linear-gradient(180deg, #101c33 0%, #0b1426 100%);
            box-sizing: border-box; border: 1px solid rgba(0,243,255,0.1);
        }
        .header-main {
            text-align: center; font-size: 24px; font-weight: 900;
            color: var(--neon); text-shadow: 0 0 15px var(--neon);
            margin: 15px 0; text-transform: uppercase;
        }
        .status-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(0,243,255,0.2);
            border-radius: 15px; padding: 12px; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 15px;
        }
        #timer { font-size: 34px; color: var(--gold); font-weight: 900; }

        /* Prediction Area */
        .ai-box {
            position: relative; border: 2px solid var(--neon); border-radius: 20px; 
            padding: 25px 10px; text-align: center; margin-bottom: 20px; 
            background: rgba(0,243,255,0.02); overflow: hidden;
        }
        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: var(--neon); box-shadow: 0 0 15px var(--neon);
            display: none; animation: scan 1.2s linear infinite;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        #pred-txt { font-size: 38px; font-weight: 900; color: #4b5563; }

        /* History List */
        .history-list { display: flex; flex-direction: column; gap: 8px; }
        .row {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 50px; padding: 5px 10px; display: flex; align-items: center; gap: 8px;
            transition: 0.3s;
        }
        .row-id {
            min-width: 28px; height: 28px; border-radius: 50%;
            background: var(--neon); color: black; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 12px;
        }
        .p-num { color: var(--neon); font-weight: bold; font-size: 11px; font-family: monospace; }

        /* Real Ball Design */
        .ball-box { display: flex; gap: 3px; }
        .ball {
            width: 22px; height: 22px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2);
            font-size: 10px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-weight: bold; color: white; background: #1a263f;
        }
        .ball.b-0 { border-color: #9b59b6; } .ball.b-5 { border-color: #2ecc71; }
        .ball.red { border-color: var(--red); } .ball.green { border-color: var(--green); }
        
        .ball.selected { transform: scale(1.15); border-width: 2px; box-shadow: 0 0 8px white; }
        .ball.sel-red { background: var(--red); }
        .ball.sel-green { background: var(--green); }
        .ball.sel-mixed { background: linear-gradient(45deg, var(--red) 50%, var(--purple) 50%); }
        .ball.sel-mixed-g { background: linear-gradient(45deg, var(--green) 50%, var(--purple) 50%); }

        .btn-action {
            width: 100%; padding: 16px; margin-top: 20px;
            background: linear-gradient(90deg, var(--neon), #bc13fe);
            border: none; border-radius: 12px; color: white;
            font-weight: bold; font-size: 16px; cursor: pointer;
        }
        #toast {
            position: fixed; bottom: -50px; left: 50%; transform: translateX(-50%);
            background: var(--neon); color: black; padding: 10px 20px;
            border-radius: 50px; font-weight: bold; transition: 0.4s; z-index: 100;
        }
        #toast.show { bottom: 20px; }
    </style>
</head>
<body>

<div id="toast">HISTORY UPDATED ✓</div>

<div class="container">
    <div class="header-main">SUPER PREDICTOR</div>

    <div class="status-card">
        <div>
            <span style="font-size: 9px; color: #94a3b8;">LIVE PERIOD</span>
            <span id="live-p" style="display:block; font-weight:bold;">---</span>
        </div>
        <div id="timer">00:00</div>
    </div>

    <div class="ai-box" id="ai-box">
        <div class="scan-line" id="scan-line"></div>
        <div id="pred-txt">AI READY</div>
    </div>

    <div id="list-container" class="history-list"></div>

    <button class="btn-action" onclick="runAI()">Better Result</button>
</div>

<script>
    // LocalStorage से डेटा उठाना (अगर है तो)
    let inputStore = JSON.parse(localStorage.getItem('wingo_data')) || new Array(20).fill(null);
    let currentLivePeriod = 0;
    let expanded = false;

    function init() {
        refresh();
        setInterval(refresh, 1000);
    }

    function refresh() {
        const now = new Date();
        const minsTotal = now.getUTCHours() * 60 + now.getUTCMinutes();
        const secs = now.getUTCSeconds();

        const dateStr = now.getUTCFullYear().toString() + 
                        (now.getUTCMonth()+1).toString().padStart(2,'0') + 
                        now.getUTCDate().toString().padStart(2,'0');
        
        const newPeriod = parseInt(dateStr + "1000" + (10001 + minsTotal));
        
        document.getElementById('timer').innerText = "00:" + (59 - secs).toString().padStart(2,'0');
        document.getElementById('live-p').innerText = newPeriod;

        // **CRITICAL HISTORY SHIFT LOGIC**
        if (currentLivePeriod !== 0 && newPeriod > currentLivePeriod) {
            // डेटा को एक कदम नीचे खिसकाओ
            for (let i = 19; i > 0; i--) {
                inputStore[i] = inputStore[i-1];
            }
            inputStore[0] = null; // नया पीरियड आया, पहला बॉक्स खाली
            saveData();
            showToast("DATA SHIFTED ✓");
        }

        currentLivePeriod = newPeriod;
        renderRows();
    }

    function renderRows() {
        const container = document.getElementById('list-container');
        container.innerHTML = "";
        let limit = expanded ? 20 : 10;

        for (let i = 0; i < limit; i++) {
            const row = document.createElement('div');
            row.className = 'row';
            const rowP = currentLivePeriod - (i + 1);
            
            let balls = '';
            for(let n=0; n<=9; n++) {
                let colorClass = (n % 2 === 0) ? 'red' : 'green';
                if(n === 0 || n === 5) colorClass = (n === 0) ? 'b-0' : 'b-5';
                
                let selClass = "";
                if(inputStore[i] === n) {
                    selClass = "selected ";
                    if(n === 0) selClass += "sel-mixed";
                    else if(n === 5) selClass += "sel-mixed-g";
                    else selClass += (n % 2 === 0) ? "sel-red" : "sel-green";
                }
                balls += `<div class="ball ${colorClass} ${selClass}" onclick="setVal(${i}, ${n})">${n}</div>`;
            }

            const idStyle = (i === 9) ? "background:#bc13fe; color:white;" : "";
            row.innerHTML = `
                <div class="row-id" style="${idStyle}" onclick="handleToggle(${i})">${i + 1}</div>
                <div style="flex:1; font-size:10px;"><span class="p-num">${rowP}</span></div>
                <div class="ball-box">${balls}</div>
            `;
            container.appendChild(row);
        }
    }

    function setVal(idx, val) {
        inputStore[idx] = val;
        saveData();
        renderRows();
    }

    function saveData() {
        localStorage.setItem('wingo_data', JSON.stringify(inputStore));
    }

    function handleToggle(idx) {
        if(idx === 9) expanded = !expanded;
        renderRows();
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    function runAI() {
        const data = inputStore.filter(v => v !== null);
        if(data.length < 3) return alert("Please fill at least 3 history inputs!");

        const predTxt = document.getElementById('pred-txt');
        const scanLine = document.getElementById('scan-line');

        predTxt.innerText = "SCANNING...";
        predTxt.style.color = "var(--gold)";
        scanLine.style.display = "block";

        setTimeout(() => {
            const avg = data.reduce((a, b) => a + b, 0) / data.length;
            const res = (avg >= 4.5) ? "BIG" : "SMALL";
            scanLine.style.display = "none";
            predTxt.innerText = res;
            predTxt.style.color = (res === "BIG") ? "var(--neon)" : "var(--gold)";
            predTxt.style.textShadow = `0 0 20px ${(res === "BIG") ? 'cyan' : 'orange'}`;
            showToast("ANALYSIS COMPLETE ✓");
        }, 1500);
    }

    init();
</script>
</body>
</html>
