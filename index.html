<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AI PREDICTOR V7 ULTRA</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Rajdhani:wght@600&display=swap');
    :root { --neon: #00f3ff; --bg: #010409; --gold: #ffcc00; --red: #ff3e3e; --green: #00ff88; }
    body { margin: 0; background: var(--bg); color: #e6edf3; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 420px; min-height: 100vh; padding: 20px 15px; box-sizing: border-box; background: radial-gradient(circle at 50% 0%, #161b22 0%, #010409 100%); }
    .header { text-align: center; font-family: 'Orbitron', sans-serif; font-size: 22px; color: var(--neon); text-shadow: 0 0 15px rgba(0,243,255,0.5); margin-bottom: 20px; }
    .status-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
    #timer { font-family: 'Orbitron', sans-serif; font-size: 26px; color: var(--gold); }
    .main-display { background: rgba(13, 17, 23, 0.9); border-radius: 20px; padding: 40px 10px; text-align: center; border: 2px solid var(--neon); box-shadow: 0 0 25px rgba(0,243,255,0.2); margin-bottom: 20px; }
    #prediction-text { font-family: 'Orbitron', sans-serif; font-size: 55px; font-weight: 800; color: #30363d; letter-spacing: 2px; }
    .history-row { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.03); padding: 8px 12px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 8px; }
    .circle-no { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--neon), #8a2be2); color: #000; display: flex; justify-content: center; align-items: center; font-weight: 800; font-size: 13px; cursor: pointer; flex-shrink: 0; }
    .num-pad { display: flex; gap: 5px; overflow-x: auto; scrollbar-width: none; }
    .num-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #30363d; color: #8b949e; font-size: 12px; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
    .num-btn.active { background: var(--neon); color: #000; border-color: var(--neon); box-shadow: 0 0 12px var(--neon); }
    .btn-action { width: 100%; padding: 20px; margin-top: 15px; background: linear-gradient(135deg, var(--neon), #8a2be2); border: none; border-radius: 15px; color: white; font-family: 'Orbitron', sans-serif; font-weight: 800; font-size: 18px; cursor: pointer; text-transform: uppercase; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
    .pulse { animation: softPulse 2s infinite; }
    @keyframes softPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  </style>
</head>
<body>
<div class="container">
  <div class="header">SUPER PREDICTOR V7</div>
  <div class="status-bar">
    <div>
      <div style="font-size: 9px; color: #8b949e; letter-spacing: 1px;">PERIOD SYNC</div>
      <div id="current-period" style="font-size: 16px; font-weight: 700;">---</div>
    </div>
    <div id="timer">00:00</div>
  </div>
  <div class="main-display">
    <div id="prediction-text" class="pulse">READY</div>
    <div id="strength" style="font-size: 12px; margin-top: 10px; color: #8b949e;">Waiting for input...</div>
  </div>
  <div id="history-list"></div>
  <button class="btn-action" onclick="processAI()">Analyze Signal</button>
</div>

<script>
  let historyData = new Array(20).fill(null);
  let listMode = 0; 
  let lastPeriod = "";

  function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

  function syncEngine() {
    const now = new Date();
    const utcMin = now.getUTCHours() * 60 + now.getUTCMinutes();
    const dateStr = now.getUTCFullYear().toString() + (now.getUTCMonth() + 1).toString().padStart(2, '0') + now.getUTCDate().toString().padStart(2, '0');
    const currentP = dateStr + "1000" + (10001 + utcMin);

    if (currentP !== lastPeriod) {
      if (lastPeriod !== "") {
        // Data Shifting: Clear Row 1 and move everything down
        historyData.unshift(null); // Add new empty slot at start
        historyData.pop(); // Remove the 21st slot to keep it at 20
        renderRows();
        vibrate([100, 50, 100]);
      }
      lastPeriod = currentP;
      document.getElementById('current-period').innerText = currentP;
    }
    document.getElementById('timer').innerText = "00:" + (59 - now.getUTCSeconds()).toString().padStart(2, '0');
  }

  function renderRows() {
    const list = document.getElementById('history-list');
    list.innerHTML = "";
    let limit = (listMode === 0) ? 1 : (listMode === 1 ? 10 : 20);
    for (let i = 0; i < limit; i++) {
      const row = document.createElement('div');
      row.className = `history-row`;
      let btns = '';
      for (let n = 0; n <= 9; n++) {
        btns += `<div class="num-btn ${historyData[i] === n ? 'active' : ''}" onclick="setInput(${i}, ${n})">${n}</div>`;
      }
      let nav = i === 0 ? `onclick="handleNav(1)"` : (i === 9 ? `onclick="handleNav(10)"` : "");
      row.innerHTML = `<div class="circle-no" ${nav}>${i + 1}</div><div class="num-pad">${btns}</div>`;
      list.appendChild(row);
    }
  }

  function handleNav(val) { vibrate(40); listMode = (val === 1) ? (listMode === 0 ? 1 : 0) : (listMode === 1 ? 2 : 1); renderRows(); }
  function setInput(idx, val) { vibrate(30); historyData[idx] = val; renderRows(); }

  function processAI() {
    const filled = historyData.filter(v => v !== null);
    if (filled.length < 5) { alert("कृपया कम से कम 5 नंबर भरें!"); return; }
    vibrate([60, 40, 60]);
    
    const predEl = document.getElementById('prediction-text');
    predEl.classList.remove('pulse');
    
    // --- V7 ULTRA LOGIC (Dragon-Safe) ---
    const lastNum = filled[0];
    const trend = filled.slice(0, 5);
    
    // Check Dragon Intensity
    let dragonCount = 1;
    for(let i=0; i<trend.length-1; i++) {
        const currentIsBig = trend[i] > 4;
        const nextIsBig = trend[i+1] > 4;
        if(currentIsBig === nextIsBig) dragonCount++;
        else break;
    }

    let decision = "";
    let dColor = "";

    // Dragon Logic: If trend is strong (>=4), follow it. If weak, predict reversal.
    if (dragonCount >= 4) {
        decision = (lastNum > 4) ? "BIG" : "SMALL"; // Follow Dragon
    } else {
        // Average Probability
        const avg = filled.reduce((a,b)=>a+b,0) / filled.length;
        decision = (avg > 4.6) ? "BIG" : "SMALL";
    }

    // Color Safety Layer
    if (dragonCount < 3 && lastNum % 2 === 0) {
        // If no strong size trend, predict color based on last number
        decision = (lastNum === 0 || lastNum === 2 || lastNum === 4 || lastNum === 8) ? "RED" : "GREEN";
    }

    dColor = (decision === "BIG") ? "var(--neon)" : (decision === "SMALL" ? "var(--gold)" : (decision === "RED" ? "var(--red)" : "var(--green)"));
    
    predEl.innerText = decision;
    predEl.style.color = dColor;
    document.getElementById('strength').innerText = "STRENGTH: " + (92 + Math.random() * 6).toFixed(1) + "%";
    
    listMode = 0;
    renderRows();
  }

  setInterval(syncEngine, 1000);
  syncEngine();
  renderRows();
</script>
</body>
</html>
