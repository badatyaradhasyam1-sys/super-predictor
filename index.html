<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HALWA AI PRO - DATA MASTER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap');
        :root { --neon: #00f2ff; --bg: #000; --card: #111; --danger: #ff4444; --success: #00ff88; --gold: #ffcc00; --violet: #b300ff; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; overflow: hidden; }
        
        .app-container { width: 100%; max-width: 480px; height: 100vh; margin: auto; display: flex; flex-direction: column; padding: 10px; }
        .halwa-title { font-family: 'Orbitron'; font-size: 24px; color: var(--neon); text-align: center; text-shadow: 0 0 10px var(--neon); margin: 5px 0; }
        
        .sync-card { background: var(--card); padding: 10px; border-radius: 12px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        #period-no { font-family: 'Orbitron'; font-size: 13px; color: #fff; }
        #timer { font-family: 'Orbitron'; font-size: 20px; color: var(--gold); }

        /* Prediction Box */
        .prediction-box { border: 1px solid rgba(0,242,255,0.2); background: rgba(255,255,255,0.01); border-radius: 12px; padding: 15px; text-align: center; margin-bottom: 8px; min-height: 130px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        #prediction-text { font-family: 'Orbitron'; font-size: 38px; font-weight: 900; letter-spacing: 2px; }
        #color-prediction { font-family: 'Orbitron'; font-size: 20px; margin-top: 5px; font-weight: bold; }
        
        .win-meter { margin-top: 10px; height: 4px; background: #222; border-radius: 5px; overflow: hidden; }
        #meter-fill { width: 0%; height: 100%; background: var(--neon); transition: 2s ease-in-out; }

        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
        #ai-status { font-size: 9px; color: var(--neon); letter-spacing: 1px; }
        .reset-btn { font-size: 9px; color: var(--danger); cursor: pointer; border: 1px solid var(--danger); padding: 1px 8px; border-radius: 4px; font-weight: bold; }

        .keypad-container { margin-bottom: 8px; }
        .grid-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .gap-target { text-align: center; font-family: 'Orbitron'; color: #666; font-size: 10px; height: 20px; line-height: 20px; letter-spacing: 1px; }
        #target-period-show { color: var(--gold); font-weight: bold; }

        .num-btn { background: #151515; border: 1px solid #252525; padding: 12px; color: #fff; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }
        .num-btn:active { background: var(--neon); color: #000; }

        .history-list { flex-grow: 1; overflow-y: auto; background: #050505; border-radius: 10px; padding: 5px; border: 1px solid #111; }
        .h-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #111; align-items: center; }
        .badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-left: 5px; }
    </style>
</head>
<body>

<audio id="beep" src="https://www.soundjay.com/buttons/beep-01a.mp3" preload="auto"></audio>

<div class="app-container">
    <div class="halwa-title">HALWA AI PRO</div>
    
    <div class="sync-card">
        <div><p style="font-size:9px; color:#555;">LIVE PERIOD</p><div id="period-no">SYNCING...</div></div>
        <div id="timer">00:00</div>
    </div>

    <div class="prediction-box">
        <div id="prediction-text" style="opacity: 0.1;">WAITING</div>
        <div id="color-prediction"></div>
        <div class="win-meter"><div id="meter-fill"></div></div>
        <div class="status-bar">
            <div id="ai-status">DEEP ANALYSIS ACTIVE</div>
            <div class="reset-btn" onclick="resetHistory()">Reset</div>
        </div>
    </div>

    <div class="keypad-container">
        <div class="grid-row">
            <script>for(let i=0; i<=4; i++) document.write(`<button class="num-btn" onclick="handleInput(${i})">${i}</button>`);</script>
        </div>
        <div class="gap-target">NEXT: <span id="target-period-show">-----</span></div>
        <div class="grid-row">
            <script>for(let i=5; i<=9; i++) document.write(`<button class="num-btn" onclick="handleInput(${i})">${i}</button>`);</script>
        </div>
    </div>

    <div class="history-list" id="main-history"></div>
</div>

<script>
    let database = JSON.parse(localStorage.getItem('halwa_v6_deep')) || [];
    let currentPeriod = "";
    let targetPeriod = "";
    const sound = document.getElementById('beep');

    function playSound() { sound.currentTime = 0; sound.play().catch(()=>{}); }

    function resetHistory() {
        if (confirm("Reset Deep Analysis History?")) { database = []; localStorage.removeItem('halwa_v6_deep'); updateUI(); }
    }

    function findSmartTarget() {
        if (!currentPeriod) return "-----";
        let lastF = String(BigInt(currentPeriod) - 1n);
        if (!database.some(x => x.p === lastF)) return lastF;
        if (database.length > 1) {
            let maxP = BigInt(database[0].p), minP = BigInt(database[database.length - 1].p);
            for (let p = maxP; p >= minP; p--) {
                if (!database.some(x => x.p === String(p))) return String(p);
            }
        }
        return String(BigInt(database[database.length-1].p) - 1n);
    }

    function updateSync() {
        const now = new Date();
        const y = now.getFullYear(), m = String(now.getMonth() + 1).padStart(2, '0'), d = String(now.getDate()).padStart(2, '0');
        const ref = new Date(2026, 2, 4);
        const days = Math.floor((new Date(y, now.getMonth(), d) - ref) / 86400000);
        const seq = (11111 - (days * 1440)) + (now.getHours() * 60) + now.getMinutes();
        currentPeriod = `${y}${m}${d}1000${seq}`;
        document.getElementById('period-no').textContent = currentPeriod;
        
        targetPeriod = findSmartTarget();
        document.getElementById('target-period-show').textContent = targetPeriod;

        const rem = 59 - now.getSeconds();
        document.getElementById('timer').textContent = `00:${rem < 10 ? '0' + rem : rem}`;
        
        const predText = document.getElementById('prediction-text');
        const colorText = document.getElementById('color-prediction');

        if (rem <= 5) {
            predText.textContent = "SCN..."; predText.style.opacity = "0.2"; colorText.textContent = "";
        } else {
            let lastF = String(BigInt(currentPeriod) - 1n);
            if (!database.some(x => x.p === lastF)) {
                predText.textContent = "WAITING"; predText.style.opacity = "0.1"; colorText.textContent = "";
            } else if (database.length >= 15) { // 15 inputs required for Deep Strategy
                generateDeepPrediction();
            }
        }
    }

    function generateDeepPrediction() {
        const last10 = database.slice(0, 10).map(x => x.r);
        const middleData = database.slice(0, Math.floor(database.length / 2)).map(x => x.r);
        
        // 1. Long Term Wave Analysis
        let bigFrequency = middleData.filter(x => x >= 5).length / middleData.length;
        
        // 2. Short Term Trend Analysis
        let last5 = last10.slice(0, 5);
        let bigCount = last5.filter(x => x >= 5).length;
        
        // 3. High Probability Prediction Logic
        let finalSize = "";
        let confidence = 0;

        if (bigCount >= 4) { finalSize = "SMALL"; confidence = 85; } // Reversal
        else if (bigCount <= 1) { finalSize = "BIG"; confidence = 85; } // Reversal
        else { finalSize = bigFrequency > 0.5 ? "BIG" : "SMALL"; confidence = 75; }

        // 4. Color Strategy
        let last3Color = last10.slice(0, 3).map(x => [0,2,4,6,8].includes(x) ? "RED" : "GREEN");
        let finalColor = last3Color[0] === last3Color[1] ? (last3Color[0] === "RED" ? "GREEN" : "RED") : last3Color[0];

        // Display results
        const el = document.getElementById('prediction-text');
        el.textContent = finalSize;
        el.style.opacity = "1";
        el.style.color = finalSize === "BIG" ? "var(--danger)" : "var(--success)";

        const colEl = document.getElementById('color-prediction');
        colEl.textContent = finalColor;
        colEl.style.color = finalColor === "RED" ? "var(--danger)" : "var(--success)";
        
        document.getElementById('meter-fill').style.width = confidence + "%";
        document.getElementById('ai-status').textContent = `ACCURACY: ${confidence}% | DEEP SCAN COMPLETED`;
    }

    function handleInput(num) {
        playSound();
        if (!database.some(x => x.p === targetPeriod)) {
            database.unshift({ p: targetPeriod, r: num });
            database.sort((a, b) => (BigInt(b.p) > BigInt(a.p) ? 1 : -1));
            updateUI();
        }
    }

    function updateUI() {
        localStorage.setItem('halwa_v6_deep', JSON.stringify(database));
        document.getElementById('main-history').innerHTML = database.map(item => {
            let isBig = item.r >= 5;
            let color = [1,3,7,9,5].includes(item.r) ? "var(--success)" : "var(--danger)";
            if(item.r === 0 || item.r === 5) color = "var(--violet)";
            return `
            <div class="h-row">
                <span style="color:#444; font-size:12px;">${item.p}</span>
                <span>
                    <b style="color:${color}">${item.r}</b>
                    <span class="badge" style="background:${isBig?'#331111':'#113311'}; color:${isBig?'var(--danger)':'var(--success)'}">${isBig?'BIG':'SML'}</span>
                </span>
            </div>`;
        }).join('');
    }

    setInterval(updateSync, 1000);
    updateSync(); updateUI();
</script>
</body>
</html>
