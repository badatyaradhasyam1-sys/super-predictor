<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Super Predictor V4 - Perfect Sync</title>
    <style>
        :root { --neon: #00f3ff; --bg: #0b1426; --gold: #ffcc00; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 420px; padding: 15px; box-sizing: border-box; }
        
        .header { text-align: center; color: var(--neon); font-size: 24px; font-weight: 900; text-shadow: 0 0 10px var(--neon); margin: 20px 0; }
        
        .status-card { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(0,243,255,0.2); }
        #timer { font-size: 32px; color: var(--gold); font-weight: bold; }

        .signal-box { border: 2px solid var(--neon); border-radius: 20px; padding: 40px 10px; text-align: center; margin: 20px 0; background: rgba(0,243,255,0.02); }
        #prediction-text { font-size: 45px; font-weight: 900; color: #4b5563; transition: 0.3s; }

        .row { background: rgba(255,255,255,0.03); border-radius: 50px; padding: 8px 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .circle-id { min-width: 32px; height: 32px; border-radius: 50%; background: var(--neon); color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 10px var(--neon); cursor: pointer; }
        .period-info { flex: 1; font-size: 10px; color: #94a3b8; line-height: 1.2; }
        .p-val { color: var(--neon); font-weight: bold; display: block; font-size: 12px; }

        .ball-grid { display: flex; gap: 4px; }
        .ball { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--neon); color: var(--neon); display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; transition: 0.2s; }
        .ball.selected { background: var(--neon); color: black; font-weight: bold; transform: scale(1.1); box-shadow: 0 0 8px var(--neon); }
        
        .btn-predict { width: 100%; padding: 18px; background: linear-gradient(90deg, var(--neon), #bc13fe); border: none; border-radius: 15px; color: white; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">SUPER PREDICTOR</div>

    <div class="status-card">
        <div>
            <div style="font-size: 10px; color: #94a3b8;">LIVE PERIOD</div>
            <div id="live-period" style="font-size: 16px; font-weight: bold;">---</div>
        </div>
        <div id="timer">00:00</div>
    </div>

    <div class="signal-box">
        <div id="prediction-text">WAITING DATA</div>
    </div>

    <div id="history-list"></div>

    <button class="btn-predict" onclick="analyzeResult()">BETTER RESULT</button>
</div>

<script>
    let userInputs = new Array(20).fill(null);
    let lastProcessedPeriod = 0;
    let isFull = false;
    let isCollapsed = false;

    function coreEngine() {
        const now = new Date();
        const seconds = now.getUTCSeconds();
        
        // WinGo 30sec Logic (0-29s and 30-59s are 2 periods)
        const total30SecIntervals = Math.floor((now.getUTCHours() * 3600 + now.getUTCMinutes() * 60 + seconds) / 30);
        
        const dateStr = now.getUTCFullYear().toString() + 
                        (now.getUTCMonth() + 1).toString().padStart(2, '0') + 
                        now.getUTCDate().toString().padStart(2, '0');
        
        const currentLiveP = dateStr + "1000" + (10001 + total30SecIntervals);
        
        // Update UI
        document.getElementById('live-period').innerText = currentLiveP;
        
        // Timer display (seconds remaining in current 30s block)
        const remaining = 30 - (seconds % 30);
        document.getElementById('timer').innerText = "00:" + remaining.toString().padStart(2, '0');

        // Shifting Logic: When period actually changes
        const currentPNum = parseInt(currentLiveP);
        if (lastProcessedPeriod !== 0 && currentPNum > lastProcessedPeriod) {
            // Shift inputs down
            for (let i = 19; i > 0; i--) {
                userInputs[i] = userInputs[i - 1];
            }
            userInputs[0] = null; // Clear Row 1 for new period
        }
        
        lastProcessedPeriod = currentPNum;
        renderRows();
    }

    function renderRows() {
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        
        let limit = isCollapsed ? 1 : (isFull ? 20 : 10);

        for (let i = 0; i < limit; i++) {
            const rowP = lastProcessedPeriod - (i + 1);
            const row = document.createElement('div');
            row.className = 'row';
            
            let balls = '';
            for(let n=0; n<=9; n++) {
                const sel = userInputs[i] === n ? 'selected' : '';
                balls += `<div class="ball ${sel}" onclick="setVal(${i}, ${n})">${n}</div>`;
            }

            row.innerHTML = `
                <div class="circle-id" onclick="toggleView(${i})">${i + 1}</div>
                <div class="period-info">PERIOD:<span class="p-val">${rowP}</span></div>
                <div class="ball-grid">${balls}</div>
            `;
            list.appendChild(row);
        }
    }

    function setVal(idx, val) { userInputs[idx] = val; renderRows(); }

    function toggleView(idx) {
        if(idx === 0) isCollapsed = !isCollapsed;
        if(idx === 9) isFull = !isFull;
        renderRows();
    }

    function analyzeResult() {
        const active = userInputs.filter(v => v !== null);
        if(active.length < 3) return alert("Please input at least 3 historical numbers!");
        
        const avg = active.reduce((a, b) => a + b, 0) / active.length;
        const res = avg >= 4.5 ? "BIG" : "SMALL";
        
        const txt = document.getElementById('prediction-text');
        txt.innerText = res;
        txt.style.color = res === "BIG" ? "var(--neon)" : "var(--gold)";
        txt.style.textShadow = "0 0 20px " + (res === "BIG" ? "cyan" : "gold");
        
        isCollapsed = true;
        renderRows();
    }

    setInterval(coreEngine, 1000);
    coreEngine();
</script>
</body>
</html>
