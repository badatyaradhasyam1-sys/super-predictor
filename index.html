<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HALWA AI - REAL ENGINE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        :root { --neon: #00f2ff; --bg: #030303; --card: #0d0d0d; --gold: #ffcc00; --danger: #ff3333; --success: #00ff66; --violet: #b300ff; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* TOP AI SCREEN */
        .ai-screen { background: var(--card); border-bottom: 2px solid #222; padding: 15px; text-align: center; position: relative; z-index: 10; box-shadow: 0 4px 20px rgba(0,0,0,0.9); }
        .target-box { font-size: 11px; color: #777; letter-spacing: 2px; }
        #live-period-display { font-family: 'Orbitron'; font-size: 26px; color: var(--gold); font-weight: 700; margin-bottom: 5px; }
        
        .result-display { min-height: 85px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; border: 1px solid #333; border-radius: 8px; margin-bottom: 10px; position: relative; overflow: hidden; }
        #ai-output { font-family: 'Orbitron'; font-size: 42px; font-weight: 900; color: #333; transition: 0.3s; z-index: 2; }
        #jackpot-box { font-family: 'Orbitron'; font-size: 16px; color: #555; margin-top: 5px; z-index: 2; letter-spacing: 2px; }

        /* THE ANALYZE BUTTON */
        .btn-analyze { background: linear-gradient(90deg, #111, #222); color: var(--neon); border: 1px solid var(--neon); width: 100%; padding: 12px; font-family: 'Orbitron'; font-size: 16px; font-weight: 900; border-radius: 6px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
        .btn-analyze:active { transform: scale(0.96); background: var(--neon); color: #000; }
        .btn-analyze.loading { background: #111; color: var(--gold); border-color: var(--gold); pointer-events: none; }

        /* SCROLLING HISTORY */
        .history-wrapper { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 5px; background: #050505; }
        .h-row { background: #0a0a0a; border: 1px solid #151515; margin-bottom: 6px; border-radius: 6px; display: flex; align-items: center; padding: 10px; transition: 0.2s; }
        .p-id-label { font-family: 'Orbitron'; font-size: 13px; color: #777; width: 95px; }
        .num-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; flex: 1; }
        .n-btn { background: #111; border: 1px solid #222; color: #666; height: 35px; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer; }
        
        /* Active states */
        .n-btn.active-r { background: var(--danger); color: #fff; border-color: var(--danger); }
        .n-btn.active-g { background: var(--success); color: #000; border-color: var(--success); }
        .n-btn.active-v { background: var(--violet); color: #fff; border-color: var(--violet); }

        .footer { background: #000; border-top: 1px solid #222; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: bold; color: #555; }
        .action-link { color: var(--neon); cursor: pointer; padding: 5px; }
    </style>
</head>
<body>

    <div class="ai-screen">
        <div class="target-box">TARGET PERIOD</div>
        <div id="live-period-display">SYNCING...</div>
        
        <div class="result-display">
            <div id="ai-output">WAITING</div>
            <div id="jackpot-box">-- --</div>
        </div>

        <button class="btn-analyze" id="analyze-btn" onclick="executeRealAI()">⚙️ RUN NEURAL ENGINE</button>
    </div>

    <div class="history-wrapper" id="scroll-area">
        <div id="history-container"></div>
    </div>

    <div class="footer">
        <span id="live-timer">00s</span>
        <span class="action-link" onclick="calibrateTime()">[ SYNC OFFSET ]</span>
        <span style="color:var(--danger); cursor:pointer;" onclick="clearAll()">[ RESET DB ]</span>
    </div>

<script>
    let db = JSON.parse(localStorage.getItem('halwa_real_v13')) || {};
    let offset = parseInt(localStorage.getItem('halwa_offset')) || 391;
    let currentLivePeriod = "";

    function getGamePeriod() {
        const now = new Date();
        const y = now.getFullYear(), m = String(now.getMonth() + 1).padStart(2, '0'), d = String(now.getDate()).padStart(2, '0');
        const minutes = now.getHours() * 60 + now.getMinutes();
        const seq = 1000 + minutes + offset;
        return `${y}${m}${d}${seq}`;
    }

    function calibrateTime() {
        let actual = prompt("गेम का वर्तमान 3 अंकों का पीरियड डालें (जैसे: 902):");
        if(actual && !isNaN(actual)) {
            const now = new Date();
            const minutes = now.getHours() * 60 + now.getMinutes();
            offset = parseInt(actual) - minutes - 1000;
            localStorage.setItem('halwa_offset', offset);
            location.reload();
        }
    }

    function buildHistoryGrid() {
        let live = getGamePeriod();
        currentLivePeriod = live;
        document.getElementById('live-period-display').textContent = live;

        const container = document.getElementById('history-container');
        let html = "";
        let base = BigInt(live);

        for (let i = 1; i <= 60; i++) {
            let pId = String(base - BigInt(i));
            let savedVal = db[pId];

            let buttonsHtml = "";
            for(let n=0; n<=9; n++) {
                let cls = "";
                if(savedVal === n) {
                    if([0,5].includes(n)) cls = "active-v";
                    else if([1,3,7,9].includes(n)) cls = "active-g";
                    else cls = "active-r";
                }
                buttonsHtml += `<button class="n-btn ${cls}" onclick="saveData('${pId}', ${n}, this)">${n}</button>`;
            }

            html += `<div class="h-row"><div class="p-id-label">${pId}</div><div class="num-grid">${buttonsHtml}</div></div>`;
        }
        container.innerHTML = html; 
    }

    function saveData(pId, num, btnElement) {
        db[pId] = num;
        localStorage.setItem('halwa_real_v13', JSON.stringify(db));
        
        let row = btnElement.parentElement;
        let allBtns = row.querySelectorAll('.n-btn');
        allBtns.forEach(b => b.className = 'n-btn'); 

        if([0,5].includes(num)) btnElement.classList.add('active-v');
        else if([1,3,7,9].includes(num)) btnElement.classList.add('active-g');
        else btnElement.classList.add('active-r');

        document.getElementById('ai-output').textContent = "DATA LOGGED";
        document.getElementById('ai-output').style.color = "#555";
        document.getElementById('jackpot-box').textContent = "PRESS ENGINE BUTTON";
    }

    // --- 🧠 THE REAL AI ALGORITHM ---
    function executeRealAI() {
        let keys = Object.keys(db).sort((a,b) => (BigInt(a) < BigInt(b)) ? -1 : 1); // Oldest to Newest
        if(keys.length < 5) return alert("AI को पैटर्न समझने के लिए कम से कम 5 लगातार इनपुट चाहिए!");

        const btn = document.getElementById('analyze-btn');
        btn.classList.add('loading');
        btn.textContent = "CALCULATING MATRICES...";

        setTimeout(() => {
            let sequence = keys.map(k => db[k]); 
            let lastNum = sequence[sequence.length - 1];
            
            // Step 1: Transition Probability (Markov-lite)
            // इतिहास में जब भी lastNum आया, उसके बाद क्या आया?
            let nextNumScores = Array(10).fill(0);
            for(let i = 0; i < sequence.length - 1; i++) {
                if(sequence[i] === lastNum) {
                    let next = sequence[i+1];
                    nextNumScores[next] += 2; // Weight of direct connection
                }
            }

            // Step 2: Recent Trend Momentum
            let recent5 = sequence.slice(-5);
            let bigCount = recent5.filter(n => n >= 5).length;
            let isTrendBig = bigCount >= 3;

            // Step 3: Gap Analysis (Due numbers)
            for(let i=0; i<=9; i++) {
                let lastSeen = sequence.lastIndexOf(i);
                let gap = lastSeen === -1 ? sequence.length : (sequence.length - 1 - lastSeen);
                if(gap > 12) nextNumScores[i] += 1; // Number is "Due"
                
                // Add Trend Weight
                if(isTrendBig && i >= 5) nextNumScores[i] += 1.5;
                if(!isTrendBig && i < 5) nextNumScores[i] += 1.5;
            }

            // Combine scores and sort
            let scoresList = [];
            for(let i=0; i<=9; i++) {
                scoresList.push({ num: i, score: nextNumScores[i] });
            }
            scoresList.sort((a, b) => b.score - a.score);

            // Extract Top 2 Targets
            let top1 = scoresList[0].num;
            let top2 = scoresList[1].num;

            // Final Size Decision based on highest scoring numbers
            let finalSize = (top1 >= 5) ? "BIG" : "SMALL";

            // If no clear pattern, default to heavy trend
            if(scoresList[0].score === 0) finalSize = isTrendBig ? "BIG" : "SMALL";

            // --- DISPLAY RESULTS ---
            const out = document.getElementById('ai-output');
            out.textContent = finalSize;
            out.style.color = finalSize === "BIG" ? "var(--danger)" : "var(--success)";
            
            document.getElementById('jackpot-box').textContent = `[ TARGETS: ${top1} , ${top2} ]`;
            document.getElementById('jackpot-box').style.color = "var(--gold)";

            btn.classList.remove('loading');
            btn.textContent = "⚙️ RUN NEURAL ENGINE";

        }, 800);
    }

    setInterval(() => {
        const seconds = new Date().getSeconds();
        document.getElementById('live-timer').textContent = `NEXT: ${60 - seconds}s`;
        
        let checkLive = getGamePeriod();
        if(checkLive !== currentLivePeriod) {
            buildHistoryGrid();
            document.getElementById('ai-output').textContent = "WAITING";
            document.getElementById('ai-output').style.color = "#333";
            document.getElementById('jackpot-box').textContent = "-- --";
        }
    }, 1000);

    function clearAll() { if(confirm("सारा डेटा उड़ा दें?")) { localStorage.removeItem('halwa_real_v13'); location.reload(); } }

    buildHistoryGrid();
</script>
</body>
</html>
