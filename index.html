<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum AI Predictor - Jalwa Edition</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --accent: #58a6ff;
            --green: #238636;
            --red: #da3633;
            --gold: #d29922;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #c9d1d9; margin: 0; padding: 15px; }
        .container { max-width: 450px; margin: auto; }
        
        /* Glassmorphism Card */
        .card {
            background: var(--card);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h2 { color: var(--accent); font-size: 1.2rem; margin-top: 0; text-align: center; border-bottom: 1px solid #30363d; padding-bottom: 10px; }

        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-group { flex: 1; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: #8b949e; }
        input, select { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; outline: none; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-predict { background: var(--accent); color: white; margin-bottom: 10px; }
        .btn-add { background: #30363d; color: white; }

        .prediction-display { text-align: center; padding: 15px; background: #0d1117; border-radius: 8px; border: 1px dashed var(--accent); margin-top: 10px; }
        .res-color { font-size: 24px; font-weight: 900; letter-spacing: 2px; }

        .martingale-box { background: rgba(210, 153, 34, 0.1); border: 1px solid var(--gold); padding: 10px; border-radius: 8px; margin-top: 15px; }
        .history-list { font-size: 0.8rem; max-height: 120px; overflow-y: auto; }
        .hist-item { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid #30363d; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>QUANTUM ANALYZER v3.0</h2>
        
        <div class="input-row">
            <div class="input-group">
                <label>नंबर (0-9)</label>
                <input type="number" id="lastNum" placeholder="Last Num">
            </div>
            <div class="input-group">
                <label>साइज</label>
                <select id="lastSize">
                    <option value="BIG">BIG</option>
                    <option value="SMALL">SMALL</option>
                </select>
            </div>
        </div>

        <button class="btn btn-add" onclick="saveHistory()">+ डेटा जोड़ें (Add Data)</button>
        <hr style="border:0.5px solid #30363d; margin: 15px 0;">
        <button class="btn btn-predict" onclick="runQuantumLogic()">प्रेडिक्शन निकालें (Analyze)</button>

        <div class="prediction-display" id="predictOutput" style="display:none;">
            <div id="status" style="font-size: 0.7rem; color: #8b949e;">RESULT DETECTED:</div>
            <div class="res-color" id="predColor">---</div>
            <div id="predSize" style="font-weight: bold;">---</div>
        </div>
    </div>

    <div class="card martingale-box">
        <label>इन्वेस्टमेंट प्लान (Martingale):</label>
        <div style="display: flex; gap: 10px; align-items: center;">
            <input type="number" id="baseAmount" value="10" style="width: 80px;">
            <span id="martingalePath" style="font-size: 0.8rem; color: var(--gold);">Next Bet: ₹10</span>
        </div>
    </div>

    <div class="card">
        <label>पैटर्न मेमोरी (History Logger):</label>
        <div class="history-list" id="historyLog">
            <p style="text-align:center; color:#555;">डेटा उपलब्ध नहीं है</p>
        </div>
    </div>
</div>

<script>
    let gameHistory = [];
    let lossCount = 0;

    function saveHistory() {
        const num = document.getElementById('lastNum').value;
        const size = document.getElementById('lastSize').value;
        if(num === "") return alert("नंबर डालें!");

        const color = (num % 2 === 0) ? "RED" : "GREEN";
        const entry = { num, size, color };
        gameHistory.unshift(entry);
        
        updateHistoryUI();
        document.getElementById('lastNum').value = "";
    }

    function updateHistoryUI() {
        const log = document.getElementById('historyLog');
        log.innerHTML = gameHistory.map(h => `
            <div class="hist-item">
                <span>Num: ${h.num}</span>
                <span style="color:${h.color === 'RED' ? '#da3633' : '#238636'}">${h.color}</span>
                <span>${h.size}</span>
            </div>
        `).join('');
    }

    function runQuantumLogic() {
        if(gameHistory.length < 1) return alert("पहले कम से कम 1 पिछला डेटा जोड़ें!");

        document.getElementById('predictOutput').style.display = 'block';
        const last = gameHistory[0];
        
        // Quantum Logic: Pattern Recognition
        let pColor = "";
        let pSize = "";

        // लॉजिक 1: अगर पिछला नंबर 0 या 5 है (Violet), तो ट्रेंड पलटने की संभावना ज्यादा है
        if(last.num == 0 || last.num == 5) {
            pColor = (last.color === "RED") ? "GREEN" : "RED";
            pSize = (last.size === "BIG") ? "SMALL" : "BIG";
        } 
        // लॉजिक 2: Dragon Trend (अगर लगातार 2 बार एक ही चीज आई है)
        else if(gameHistory.length >= 2 && gameHistory[0].color === gameHistory[1].color) {
            pColor = last.color; // Dragon continuation
            pSize = last.size;
        }
        else {
            // लॉजिक 3: Zig-Zag Pattern
            pColor = (last.color === "RED") ? "GREEN" : "RED";
            pSize = (last.size === "BIG") ? "SMALL" : "BIG";
        }

        // UI Update
        const colorEl = document.getElementById('predColor');
        colorEl.innerText = pColor;
        colorEl.style.color = (pColor === "RED") ? "var(--red)" : "var(--green)";
        document.getElementById('predSize').innerText = "PROBABLE: " + pSize;

        // Martingale Calculation
        updateMartingale();
    }

    function updateMartingale() {
        const base = parseInt(document.getElementById('baseAmount').value);
        // हमने यहाँ 3x मेथड यूज़ किया है
        const nextBet = base * Math.pow(3, lossCount);
        document.getElementById('martingalePath').innerText = `Next Bet: ₹${nextBet} (Level ${lossCount + 1})`;
        
        // डेमो के लिए: आप इसे हारने पर बढ़ा सकते हैं। असली ऐप में यहाँ Win/Loss बटन होगा।
    }
</script>

</body>
</html>
