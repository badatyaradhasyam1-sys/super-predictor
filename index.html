<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jalwa Quantum Pro</title>
    <style>
        :root {
            --primary-neon: #ff007a;
            --secondary-neon: #00f2ff;
            --bg-dark: #0a0e14;
            --card-bg: #161b22;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .app-shell {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background: linear-gradient(180deg, #0f172a 0%, #000000 100%);
            padding-bottom: 80px;
        }

        /* Top Header */
        .header {
            padding: 20px;
            text-align: center;
            background: rgba(22, 27, 34, 0.8);
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 20px;
            letter-spacing: 3px;
            background: linear-gradient(to right, var(--secondary-neon), var(--primary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        /* Period & Timer */
        .game-info {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            margin: 15px;
            background: var(--card-bg);
            border-radius: 12px;
            border-left: 4px solid var(--secondary-neon);
        }

        .timer { font-size: 22px; color: #ffcc00; font-weight: bold; }

        /* Prediction Card - Jalwa Style */
        .main-card {
            margin: 15px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .prob-bar {
            width: 80%;
            height: 4px;
            background: #333;
            margin: 15px auto;
            border-radius: 2px;
            overflow: hidden;
        }

        #fill { width: 0%; height: 100%; background: var(--secondary-neon); transition: 1s; }

        #prediction-output {
            font-size: 54px;
            font-weight: 800;
            margin: 10px 0;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        /* Input Section */
        .input-panel {
            padding: 20px;
            background: rgba(22, 27, 34, 0.5);
            margin: 0 15px;
            border-radius: 15px;
        }

        .input-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #000;
            color: #fff;
            font-size: 20px;
            text-align: center;
        }

        .btn-action {
            padding: 15px 25px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            background: var(--secondary-neon);
            color: #000;
        }

        .get-signal-btn {
            width: 100%;
            padding: 18px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(90deg, #7000ff, #ff007a);
            color: white;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 0, 122, 0.3);
            cursor: pointer;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 480px;
            height: 65px;
            background: #161b22;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #333;
        }

        .nav-item { color: #64748b; font-size: 10px; text-align: center; }
        .nav-item.active { color: var(--secondary-neon); }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="header">
        <h1>Jalwa AI Predictor</h1>
    </div>

    <div class="game-info">
        <div>
            <p style="font-size: 10px; color: #94a3b8;">Period ID</p>
            <p id="period-id" style="font-size: 14px;">20260304010567</p>
        </div>
        <div class="timer" id="timer">00:45</div>
    </div>

    <div class="main-card">
        <p style="font-size: 12px; letter-spacing: 2px; color: #94a3b8;">SYSTEM PREDICTION</p>
        <div id="prediction-output">WAITING</div>
        <div class="prob-bar"><div id="fill"></div></div>
        <p id="accuracy-text" style="font-size: 12px; color: var(--secondary-neon);">Inputs Needed: <span id="need-count">10</span></p>
    </div>

    <div class="input-panel">
        <div class="input-box">
            <input type="number" id="manual-input" placeholder="Enter Result" min="0" max="9">
            <button class="btn-action" onclick="pushData()">ADD</button>
        </div>
        
        <div id="data-chips" style="display:flex; gap:5px; flex-wrap:wrap; margin-bottom:20px;"></div>

        <button class="get-signal-btn" onclick="runJalwaEngine()">GET AI SIGNAL</button>
        <p style="text-align:center; font-size:10px; color:#475569; margin-top:15px;">*Data feeds directly into the neural trend analyzer.</p>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active">🏠<br>Home</div>
        <div class="nav-item">📈<br>Activity</div>
        <div class="nav-item">💰<br>Wallet</div>
        <div class="nav-item">👤<br>Account</div>
    </div>
</div>

<script>
    let dataStream = [];

    function pushData() {
        const input = document.getElementById('manual-input');
        const val = parseInt(input.value);

        if(isNaN(val) || val < 0 || val > 9) return;

        if(dataStream.length < 10) {
            dataStream.push(val);
            renderChips();
            document.getElementById('need-count').textContent = 10 - dataStream.length;
            input.value = "";
        }
    }

    function renderChips() {
        const container = document.getElementById('data-chips');
        container.innerHTML = dataStream.map(n => 
            `<span style="background:#00f2ff22; color:#00f2ff; padding:5px 10px; border-radius:5px; font-size:12px; border:1px solid #00f2ff55">${n}</span>`
        ).join('');
    }

    function runJalwaEngine() {
        if(dataStream.length < 10) {
            alert("Please provide at least 10 inputs for accurate analysis.");
            return;
        }

        const output = document.getElementById('prediction-output');
        const fill = document.getElementById('fill');
        const acc = document.getElementById('accuracy-text');

        output.textContent = "SCANNING";
        output.style.color = "#64748b";
        fill.style.width = "0%";

        setTimeout(() => {
            // Complex Logic
            let sum = dataStream.reduce((a, b) => a + b, 0);
            let avg = sum / dataStream.length;
            let lastNum = dataStream[dataStream.length - 1];
            
            let result = "";
            let confidence = Math.floor(Math.random() * (96 - 82) + 82);

            // Pattern Logic: If avg is high, trend shifts to Small
            if(avg > 4.5) {
                result = (lastNum > 4) ? "SMALL" : "BIG";
            } else {
                result = (lastNum < 5) ? "BIG" : "SMALL";
            }

            output.textContent = result;
            output.style.color = (result === "BIG") ? "#00f2ff" : "#ffcc00";
            fill.style.width = confidence + "%";
            acc.textContent = "AI CONFIDENCE: " + confidence + "%";
            
            // Auto-reset after signal to keep it fresh
            dataStream = []; 
        }, 1800);
    }

    // Timer Simulation
    setInterval(() => {
        const now = new Date();
        const s = 59 - now.getSeconds();
        document.getElementById('timer').textContent = "00:" + (s < 10 ? "0"+s : s);
    }, 1000);
</script>

</body>
</html>
