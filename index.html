<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Super Predictor Pro AI</title>
  <style>
    :root {
      --neon: #00f3ff; --bg: #020617; --glass: rgba(255, 255, 255, 0.05);
      --gold: #fbbf24; --purple: #bc13fe;
    }
    body {
      margin: 0; background: var(--bg); color: white;
      font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center;
    }
    .container {
      width: 100%; max-width: 420px; min-height: 100vh; padding: 15px;
      border: 1px solid rgba(0,243,255,0.2);
      background: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
    }
    .header {
      text-align: center; font-size: 26px; font-weight: 900;
      letter-spacing: 4px; color: var(--neon); text-shadow: 0 0 15px var(--neon);
      margin: 15px 0;
    }
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--glass); padding: 12px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;
    }
    #timer { font-size: 32px; color: var(--gold); font-weight: bold; }

    .prediction-area {
      padding: 30px; margin-bottom: 25px; border-radius: 20px;
      border: 2px solid var(--neon); text-align: center; background: #0f172a;
    }
    #prediction-text { font-size: 40px; font-weight: 900; color: #64748b; letter-spacing: 3px; }

    .history-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--glass); padding: 8px 12px; border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.05); margin-bottom: 10px;
    }
    .circle-no {
      width: 35px; height: 35px; border-radius: 50%; background: var(--neon);
      color: #000; display: flex; justify-content: center; align-items: center;
      font-weight: bold; cursor: pointer; box-shadow: 0 0 10px var(--neon);
    }
    .period-info { flex: 1; font-size: 10px; color: #94a3b8; font-family: monospace; }
    .num-pad { display: flex; gap: 4px; }
    .num-btn {
      width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--neon);
      color: var(--neon); font-size: 11px; display: flex;
      justify-content: center; align-items: center; cursor: pointer;
    }
    .num-btn.selected { background: var(--neon); color: #000; }
    .btn-action {
      width: 100%; padding: 18px; background: linear-gradient(90deg, var(--neon), var(--purple));
      border: none; border-radius: 15px; color: white; font-weight: bold; font-size: 18px; cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">SUPER PREDICTOR</div>

  <div class="status-bar">
    <div>
      <div style="font-size: 10px; color: #94a3b8;">LIVE PERIOD</div>
      <div id="current-p" style="font-size: 16px; font-weight: bold;">---</div>
    </div>
    <div id="timer">00:00</div>
  </div>

  <div class="prediction-area">
    <div id="prediction-text">WAITING DATA</div>
  </div>

  <div id="history-list"></div>
  <button class="btn-action" onclick="generateResult()">BETTER RESULT</button>
</div>

<script>
  let historyData = new Array(20).fill(null);
  let lastPeriod = 0;
  let showFull = false;

  function updateSystem() {
    const now = new Date();
    const utcHours = now.getUTCHours();
    const utcMinutes = now.getUTCMinutes();
    const utcSeconds = now.getUTCSeconds();

    // पीरियड बनाने का सही तरीका: YYYYMMDD + 1-min interval
    const dateStr = now.getUTCFullYear().toString() + 
                    (now.getUTCMonth()+1).toString().padStart(2,'0') + 
                    now.getUTCDate().toString().padStart(2,'0');
    
    const currentP = parseInt(dateStr + "1000" + (10001 + (utcHours * 60 + utcMinutes)));
    
    document.getElementById('current-p').innerText = currentP;
    document.getElementById('timer').innerText = "00:" + (59 - utcSeconds).toString().padStart(2,'0');

    // **PERIOD FIX LOGIC:** अगर पीरियड बदल गया है, तो डेटा खिसकाएँ
    if (lastPeriod !== 0 && currentP > lastPeriod) {
        for (let i = 19; i > 0; i--) {
            historyData[i] = historyData[i-1];
        }
        historyData[0] = null; // सीरियल 1 को नए इनपुट के लिए खाली करें
    }
    lastPeriod = currentP;
    render();
  }

  function render() {
    const list = document.getElementById('history-list');
    list.innerHTML = "";
    let limit = showFull ? 20 : 10;

    for (let i = 0; i < limit; i++) {
      const row = document.createElement('div');
      row.className = 'history-row';
      
      let pads = '';
      for(let n=0; n<=9; n++) {
        const selected = historyData[i] === n ? 'selected' : '';
        pads += `<div class="num-btn ${selected}" onclick="setVal(${i}, ${n})">${n}</div>`;
      }

      // P-1 Logic: सीरियल 1 = Live Period - 1, सीरियल 2 = Live Period - 2
      row.innerHTML = `
        <div class="circle-no" onclick="handleToggle(${i})">${i + 1}</div>
        <div class="period-info">P: ${lastPeriod - (i + 1)}</div>
        <div class="num-pad">${pads}</div>
      `;
      list.appendChild(row);
    }
  }

  function setVal(idx, val) { historyData[idx] = val; render(); }
  
  function handleToggle(idx) {
    if(idx === 9) showFull = !showFull;
    render();
  }

  function generateResult() {
    const data = historyData.filter(v => v !== null);
    if(data.length < 3) { alert("कम से कम 3 हिस्ट्री भरें!"); return; }
    const avg = data.reduce((a, b) => a + b, 0) / data.length;
    const res = (avg > 4.4) ? "BIG" : "SMALL";
    const predEl = document.getElementById('prediction-text');
    predEl.innerText = res;
    predEl.style.color = (res === "BIG") ? "var(--neon)" : "var(--gold)";
  }

  setInterval(updateSystem, 1000);
  updateSystem();
</script>
</body>
</html>
