<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HALWA AI PRO - FIXED INPUT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap');
        :root { --neon: #00f2ff; --bg: #000; --card: #111; --danger: #ff4444; --success: #00ff88; --gold: #ffcc00; --violet: #b300ff; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; overflow: hidden; transition: 0.5s; }
        body.safe-lock { background: #1a0f00; }
        .app-container { width: 100%; max-width: 480px; height: 100vh; margin: auto; display: flex; flex-direction: column; padding: 10px; }
        .halwa-title { font-family: 'Orbitron'; font-size: 22px; color: var(--neon); text-align: center; text-shadow: 0 0 10px var(--neon); margin-bottom: 5px; }
        
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 8px; }
        .stat-card { background: #151515; padding: 5px; border-radius: 8px; text-align: center; border: 1px solid #222; }
        .stat-label { font-size: 9px; color: #666; }
        .stat-val { font-family: 'Orbitron'; font-size: 13px; color: var(--neon); }

        .sync-card { background: var(--card); padding: 10px; border-radius: 12px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        #period-no { font-family: 'Orbitron'; font-size: 13px; color: #fff; }
        #timer { font-family: 'Orbitron'; font-size: 20px; color: var(--gold); }

        .prediction-box { position: relative; border: 1px solid rgba(0,242,255,0.2); background: rgba(255,255,255,0.01); border-radius: 12px; padding: 15px; text-align: center; margin-bottom: 8px; min-height: 130px; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        #prediction-text { font-family: 'Orbitron'; font-size: 42px; font-weight: 900; color: #333; z-index: 2; }
        #color-prediction { font-family: 'Orbitron'; font-size: 18px; margin-top: 5px; font-weight: bold; }
        #martingale-tag { font-size: 11px; color: var(--gold); margin-top: 4px; }
        
        .scan-line { position: absolute; width: 100%; height: 2px; background: var(--neon); top: 0; left: 0; opacity: 0; }
        .scanning .scan-line { animation: scan 1.2s infinite; opacity: 1; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .predict-btn { background: linear-gradient(135deg, #00f2ff, #0066ff); color: #000; border: none; padding: 12px; border-radius: 8px; font-family: 'Orbitron'; font-weight: 900; font-size: 15px; margin-bottom: 8px; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 10px rgba(0,242,255,0.3); }
        .predict-btn:disabled { opacity: 0.3; }

        .grid-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 5px; }
        .num-btn { background: #151515; border: 1px solid #252525; padding: 12px; color: #fff; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }
        .num-btn:active { background: var(--neon); color: #000; }

        .history-list { flex-grow: 1; overflow-y: auto; background: #050505; border-radius: 10px; padding: 5px; border: 1px solid #111; font-size: 12px; }
        .h-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #111; align-items: center; }
        .badge { padding: 1px 6px; border-radius: 3px; font-size: 9px; font-weight: bold; margin-left: 4px; }
        
        .gap-info { display: flex; justify-content: space-between; padding: 2px 5px; font-size: 10px; color: #555; font-family: 'Orbitron'; }
    </style>
</head>
<body>

<audio id="beep" src="https://www.soundjay.com/buttons/beep-01a.mp3" preload="auto"></audio>

<div class="app-container">
    <div class="halwa-title">HALWA AI NEURAL <span id="v-tag" style="color:var(--success)">V10.1</span></div>
    
    <div class="stats-bar">
        <div class="stat-card"><div class="stat-label">WIN RATE</div><div id="win-rate" class="stat-val">0%</div></div>
        <div class="stat-card"><div class="stat-label">STREAK</div><div id="streak-val" class="stat-val">0</div></div>
        <div class="stat-card"><div class="stat-label">INPUTS</div><div id="input-count" class="stat-val">0/10</div></div>
    </div>

    <div class="sync-card">
        <div><p style="font-size:8px; color:#444;">LIVE PERIOD</p><div id="period-no">SYNCING...</div></div>
        <div id="timer">00:00</div>
    </div>

    <div class="prediction-box" id="p-box">
        <div class="scan-line"></div>
        <div id="prediction-text">WAITING...</div>
        <div id="color-prediction"></div>
        <div id="martingale-tag"></div>
    </div>

    <button class="predict-btn" id="main-predict-btn" onclick="triggerNeuralPrediction()">ANALYZE PATTERN</button>

    <div class="keypad-container">
        <div class="grid-row">
            <script>for(let i=0; i<=4; i++) document.write(`<button class="num-btn" onclick="handleInput(${i})">${i}</button>`);</script>
        </div>
        <div class="gap-info">
            <span>INPUT TARGET: <b id="target-show" style="color:var(--gold)">---</b></span>
            <span onclick="resetAI()" style="color:var(--danger); cursor:pointer">RESET MEMORY</span>
        </div>
        <div class="grid-row">
            <script>for(let i=5; i<=9; i++) document.write(`<button class="num-btn" onclick="handleInput(${i})">${i}</button>`);</script>
        </div>
    </div>

    <div class="history-list" id="main-history"></div>
</div>

<script>
    let database = JSON.parse(localStorage.getItem('halwa_v10_fix')) || [];
    let lastPred = JSON.parse(localStorage.getItem('halwa_last_p')) || null;
    let mLevel = parseInt(localStorage.getItem('halwa_m_lvl')) || 1;
    let winStreak = parseInt(localStorage.getItem('halwa_strk')) || 0;
    let currentLivePeriod = "";
    let manualTargetPeriod = "";

    function playSound() { document.getElementById('beep').currentTime = 0; document.getElementById('beep').play().catch(()=>{}); }

    function resetAI() { if(confirm("साफ करें?")) { localStorage.clear(); location.reload(); } }

    function updateClock() {
        const now = new Date();
        const y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0'), d = String(now.getDate()).padStart(2,'0');
        const ref = new Date(2026, 2, 4);
        const days = Math.floor((new Date(y, now.getMonth(), d) - ref) / 86400000);
        const seq = (11111 - (days * 1440)) + (now.getHours() * 60) + now.getMinutes();
        currentLivePeriod = `${y}${m}${d}1000${seq}`;
        document.getElementById('period-no').textContent = currentLivePeriod;
        
        // --- FIXED TARGET LOGIC ---
        // अगर डेटाबेस खाली है, तो पिछला पीरियड दिखाओ। 
        // अगर भरा है, तो सबसे पुराने के नीचे वाला दिखाओ ताकि लाइन से 10 भर सकें।
        if(database.length === 0) {
            manualTargetPeriod = String(BigInt(currentLivePeriod) - 1n);
        } else {
            // सबसे पुराने पीरियड से एक कम वाला टारगेट सेट करें ताकि यूजर लगातार पीछे का डेटा भर सके
            let oldest = database[database.length - 1].p;
            let newest = database[0].p;
            
            // अगर ताज़ा पीरियड अभी नहीं भरा है, तो उसे भरें, वरना पीछे का भरें
            let lastPeriod = String(BigInt(currentLivePeriod) - 1n);
            if(!database.some(x => x.p === lastPeriod)) {
                manualTargetPeriod = lastPeriod;
            } else {
                manualTargetPeriod = String(BigInt(oldest) - 1n);
            }
        }
        document.getElementById('target-show').textContent = manualTargetPeriod.slice(-4);

        const rem = 59 - now.getSeconds();
        document.getElementById('timer').textContent = `00:${rem < 10 ? '0'+rem : rem}`;
        
        if(winStreak >= 5) {
            document.body.classList.add('safe-lock');
            document.getElementById('main-predict-btn').disabled = true;
            document.getElementById('prediction-text').textContent = "BREAK TIME";
        }
    }

    function handleInput(num) {
        playSound();
        // डुप्लीकेट चेक
        if(database.some(x => x.p === manualTargetPeriod)) return;

        let entry = { p: manualTargetPeriod, r: num, win: null };
        
        // Win Tracker
        if(lastPred && lastPred.period === manualTargetPeriod) {
            entry.win = (num >= 5 === (lastPred.size === "BIG"));
            if(entry.win) { mLevel = 1; winStreak++; } 
            else { mLevel = mLevel < 5 ? mLevel+1 : 1; winStreak = 0; }
            localStorage.setItem('halwa_m_lvl', mLevel);
            localStorage.setItem('halwa_strk', winStreak);
        }

        database.push(entry);
        // सॉर्ट करें ताकि नया ऊपर रहे
        database.sort((a,b) => BigInt(b.p) > BigInt(a.p) ? 1 : -1);
        if(database.length > 50) database.pop();
        
        updateUI();
    }

    function triggerNeuralPrediction() {
        if(database.length < 10) { alert("10 इनपुट चाहिए! अभी सिर्फ " + database.length + " हैं।"); return; }
        playSound();
        const box = document.getElementById('p-box');
        box.classList.add('scanning');
        document.getElementById('prediction-text').textContent = "DEEP SCAN...";
        
        setTimeout(() => {
            box.classList.remove('scanning');
            const results = database.map(x => x.r).reverse();
            const lastR = results[results.length-1];
            
            // AI Logic
            let seqSize = null;
            let last3 = results.slice(-3).join(',');
            for(let i=0; i<results.length-4; i++) {
                if(results.slice(i, i+3).join(',') === last3) { seqSize = results[i+3] >= 5 ? "BIG" : "SMALL"; break; }
            }

            let finalS = seqSize || (results.filter(x => x>=5).length / results.length > 0.5 ? "BIG" : "SMALL");
            let finalC = finalS === "BIG" ? "RED" : "GREEN";

            document.getElementById('prediction-text').textContent = finalS;
            document.getElementById('prediction-text').style.color = finalS === "BIG" ? "var(--danger)" : "var(--success)";
            document.getElementById('color-prediction').textContent = finalC;
            document.getElementById('color-prediction').style.color = finalC === "RED" ? "var(--danger)" : "var(--success)";
            document.getElementById('martingale-tag').textContent = "MARTINGALE: LEVEL " + mLevel;
            document.getElementById('conf-val').textContent = seqSize ? "HIGH" : "MID";

            lastPred = { period: currentLivePeriod, size: finalS };
            localStorage.setItem('halwa_last_p', JSON.stringify(lastPred));
        }, 1000);
    }

    function updateUI() {
        localStorage.setItem('halwa_v10_fix', JSON.stringify(database));
        document.getElementById('input-count').textContent = database.length + "/10";
        document.getElementById('streak-val').textContent = winStreak;
        let winNodes = database.filter(x => x.win !== null);
        let rate = winNodes.length ? Math.round((winNodes.filter(x => x.win).length / winNodes.length) * 100) : 0;
        document.getElementById('win-rate').textContent = rate + "%";

        document.getElementById('main-history').innerHTML = database.map(item => `
            <div class="h-row">
                <span>${item.p.slice(-4)} | ${item.win === null ? "" : (item.win ? "<b style='color:var(--success)'>WIN</b>":"<b style='color:var(--danger)'>LOSS</b>")}</span>
                <span>
                    <b style="color:${[1,3,7,9,5].includes(item.r)?'var(--success)':'var(--danger)'}">${item.r}</b>
                    <span class="badge" style="background:#222; color:#fff">${item.r>=5?'BIG':'SML'}</span>
                </span>
            </div>`).join('');
    }

    setInterval(updateClock, 1000);
    updateClock(); updateUI();
</script>
</body>
</html>
