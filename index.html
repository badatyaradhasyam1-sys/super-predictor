<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Super Predictor Auto-Shift</title>
  <style>
    :root { --neon: #00f3ff; --bg: #020617; --glass: rgba(255, 255, 255, 0.05); }
    body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 420px; min-height: 100vh; padding: 15px; border: 1px solid var(--neon); box-shadow: 0 0 20px rgba(0,243,255,0.2); }
    .header { text-align: center; font-size: 24px; font-weight: 900; color: var(--neon); text-shadow: 0 0 10px var(--neon); margin-bottom: 20px; }
    
    .status-bar { display: flex; justify-content: space-between; background: var(--glass); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
    #timer { font-size: 30px; color: #fbbf24; font-weight: bold; }

    .main-display { background: #0f172a; border-radius: 20px; padding: 25px; text-align: center; border: 2px solid var(--neon); margin-bottom: 20px; }
    #prediction-text { font-size: 35px; font-weight: 900; color: #64748b; }

    .history-section { display: flex; flex-direction: column; gap: 8px; }
    .history-row { display: flex; align-items: center; gap: 10px; background: var(--glass); padding: 8px; border-radius: 50px; border: 1px solid rgba(0,243,255,0.1); }
    .circle-no { width: 32px; height: 32px; border-radius: 50%; background: var(--neon); color: #000; display: flex; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; }
    .period-info { flex: 1; font-size: 11px; color: #94a3b8; font-family: monospace; }
    
    .num-pad { display: flex; gap: 3px; }
    .num-btn { width: 25px; height: 25px; border-radius: 50%; border: 1px solid var(--neon); color: var(--neon); font-size: 11px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    .num-btn.active { background: var(--neon); color: #000; box-shadow: 0 0 10px var(--neon); }

    .btn-action { width: 100%; padding: 15px; margin-top: 20px; background: linear-gradient(90deg, var(--neon), #bc13fe); border: none; border-radius: 12px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">SUPER PREDICTOR</div>

  <div class="status-bar">
    <div>
      <div style="font-size: 10px; color: #94a3b8;">CURRENT PERIOD</div>
      <div id="current-period" style="font-size: 18px; font-weight: bold;">---</div>
    </div>
    <div id="timer">00:00</div>
  </div>

  <div class="main-display">
    <div id="prediction-text">PUT INPUT AT 1</div>
  </div>

  <div id="history-list" class="history-section"></div>

  <button class="btn-action" onclick="getAIResult()">GET BETTER RESULT</button>
</div>

<script>
  let historyData = new Array(20).fill(null);
  let lastSavedPeriod = 0;
  let isCollapsed = false;

  function update() {
    const now = new Date();
    const utcHours = now.getUTCHours();
    const utcMinutes = now.getUTCMinutes();
    const utcSeconds = now.getUTCSeconds();

    const dateStr = now.getUTCFullYear().toString() + (now.getUTCMonth()+1).toString().padStart(2,'0') + now.getUTCDate().toString().padStart(2,'0');
    const totalMin = utcHours * 60 + utcMinutes;
    const currentP = parseInt(dateStr + "1000" + (10001 + totalMin));
    
    document.getElementById('current-period').innerText = currentP;
    document.getElementById('timer').innerText = "00:" + (59 - utcSeconds).toString().padStart(2,'0');

    // ** SHIFTING LOGIC **
    // अगर पीरियड बदल गया है, तो डाटा को नीचे खिसकाओ
    if (lastSavedPeriod !== 0 && currentP > lastSavedPeriod) {
        shiftData();
    }
    lastSavedPeriod = currentP;
    render();
  }

  function shiftData() {
    // सारे इनपुट्स को एक कदम नीचे धकेलो
    for (let i = 19; i > 0; i--) {
        historyData[i] = historyData[i-1];
    }
    historyData[0] = null; // 1 नंबर को खाली करो ताकि नया इनपुट आ सके
  }

  function render() {
    const list = document.getElementById('history-list');
    list.innerHTML = "";
    const limit = isCollapsed ? 1 : 20;

    for (let i = 0; i < limit; i++) {
      const row = document.createElement('div');
      row.className = `history-row`;
      
      let pads = '';
      for(let n=0; n<=9; n++) {
        const active = historyData[i] === n ? 'active' : '';
        pads += `<div class="num-btn ${active}" onclick="setVal(${i}, ${n})">${n}</div>`;
      }

      row.innerHTML = `
        <div class="circle-no" onclick="toggleView(${i})">${i + 1}</div>
        <div class="period-info">P: ${lastSavedPeriod - (i + 1)}</div>
        <div class="num-pad">${pads}</div>
      `;
      list.appendChild(row);
    }
  }

  function setVal(idx, val) {
    historyData[idx] = val;
    render();
  }

  function toggleView(idx) {
    if(idx === 0) { isCollapsed = !isCollapsed; render(); }
  }

  function getAIResult() {
    const valid = historyData.filter(v => v !== null);
    if(valid.length < 3) { alert("कम से कम 3 इनपुट भरें!"); return; }
    
    const avg = valid.reduce((a,b) => a+b, 0) / valid.length;
    let res = avg >= 4.5 ? "BIG" : "SMALL";
    const el = document.getElementById('prediction-text');
    el.innerText = res;
    el.style.color = res === "BIG" ? "var(--neon)" : "#fbbf24";
    isCollapsed = true;
    render();
  }

  setInterval(update, 1000);
  update();
</script>
</body>
</html>
