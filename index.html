<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jalwa AI Predictor V2 - Accuracy Boost</title>
    <style>
        :root {
            --bg: #060b19; --neon: #00f3ff; --gold: #ffcc00;
            --red: #ff4d4d; --green: #2ecc71; --purple: #9b59b6;
        }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 420px; padding: 15px; box-sizing: border-box; }
        
        /* Prediction Display */
        .header { text-align: center; color: var(--neon); font-weight: 900; font-size: 22px; margin-bottom: 20px; text-shadow: 0 0 10px var(--neon); }
        .pred-card {
            background: rgba(255,255,255,0.02); border: 2px solid var(--neon); border-radius: 20px;
            padding: 30px 10px; text-align: center; margin-bottom: 20px; position: relative;
        }
        #result-display { font-size: 45px; font-weight: 900; color: #334155; transition: 0.5s; }
        #confidence { font-size: 12px; color: var(--gold); margin-top: 10px; display: none; }

        /* History Table */
        .history-row {
            display: flex; align-items: center; background: rgba(255,255,255,0.03);
            margin-bottom: 8px; padding: 8px 12px; border-radius: 12px; border: 1px solid rgba(0,243,255,0.1);
        }
        .period-info { flex: 1; font-family: monospace; font-size: 13px; color: #94a3b8; }
        .ball-group { display: flex; gap: 4px; }
        .ball {
            width: 25px; height: 25px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; cursor: pointer;
        }
        .ball.active { border-width: 2px; transform: scale(1.1); box-shadow: 0 0 10px white; }
        .ball.red { border-color: var(--red); } .ball.green { border-color: var(--green); }
        .ball.sel-red { background: var(--red); } .ball.sel-green { background: var(--green); }

        .btn-predict {
            width: 100%; padding: 18px; border: none; border-radius: 15px;
            background: linear-gradient(90deg, #00f3ff, #bc13fe);
            color: white; font-size: 18px; font-weight: 900; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">JALWA AI - PATTERN FIX</div>

    <div class="pred-card">
        <div id="result-display">READY</div>
        <div id="confidence">CONFIDENCE: <span id="conf-val">0</span>%</div>
    </div>

    <div id="history-box"></div>

    <button class="btn-predict" onclick="analyzePatterns()">GET SMART PREDICTION</button>
</div>

<script>
    let historyData = JSON.parse(localStorage.getItem('jalwa_smart_v2')) || new Array(10).fill(null);
    let livePeriod = 0;

    function sync() {
        const now = new Date();
        const utcMins = now.getUTCHours() * 60 + now.getUTCMinutes();
        const dateStr = now.getUTCFullYear().toString() + (now.getUTCMonth()+1).toString().padStart(2,'0') + now.getUTCDate().toString().padStart(2,'0');
        const newPeriod = parseInt(dateStr + "1000" + (10001 + utcMins));

        if (livePeriod !== 0 && newPeriod > livePeriod) {
            historyData.unshift(null);
            historyData.pop();
            save();
        }
        livePeriod = newPeriod;
        render();
    }

    function render() {
        const box = document.getElementById('history-box');
        box.innerHTML = '';
        for (let i = 0; i < 10; i++) {
            const rowP = livePeriod - (i + 1);
            let ballsHtml = '';
            for (let n = 0; n <= 9; n++) {
                const isSelected = historyData[i] === n;
                const color = (n % 2 === 0) ? 'red' : 'green';
                const selClass = isSelected ? (color === 'red' ? 'sel-red active' : 'sel-green active') : '';
                ballsHtml += `<div class="ball ${color} ${selClass}" onclick="setVal(${i}, ${n})">${n}</div>`;
            }
            box.innerHTML += `
                <div class="history-row">
                    <div class="period-info">...${rowP.toString().slice(-5)}</div>
                    <div class="ball-group">${ballsHtml}</div>
                </div>`;
        }
    }

    function setVal(idx, val) { historyData[idx] = val; save(); render(); }
    function save() { localStorage.setItem('jalwa_smart_v2', JSON.stringify(historyData)); }

    function analyzePatterns() {
        const validData = historyData.filter(x => x !== null);
        if (validData.length < 5) return alert("पैटर्न पकड़ने के लिए कम से कम 5 डेटा भरें!");

        const display = document.getElementById('result-display');
        const confBox = document.getElementById('confidence');
        display.innerText = "ANALYZING...";
        
        setTimeout(() => {
            // Logic 1: Last 3 Trend
            const last3 = validData.slice(0, 3);
            const isLastBig = last3.every(v => v >= 5);
            const isLastSmall = last3.every(v => v < 5);

            // Logic 2: Frequency
            const bigCount = validData.filter(v => v >= 5).length;
            const smallCount = validData.length - bigCount;

            let finalRes = "";
            let confidence = 0;

            if (isLastBig) { finalRes = "SMALL"; confidence = 85; } // Break the streak
            else if (isLastSmall) { finalRes = "BIG"; confidence = 85; }
            else if (bigCount > smallCount) { finalRes = "SMALL"; confidence = 72; }
            else { finalRes = "BIG"; confidence = 70; }

            display.innerText = finalRes;
            display.style.color = (finalRes === "BIG") ? "var(--neon)" : "var(--gold)";
            confBox.style.display = "block";
            document.getElementById('conf-val').innerText = confidence;
        }, 1200);
    }

    setInterval(sync, 1000);
    sync();
</script>
</body>
</html>
